<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perry &amp; Parkes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5ede3; font-family: 'Barlow', sans-serif; min-height: 100vh; color: #2a2a26; }

/* LOGIN */
#login-screen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; background:#f5ede3; }
.login-logo { text-align:center; margin-bottom:48px; }
.login-logo img { width:280px; max-width:90vw; }
.login-title { font-size:13px; color:#888; letter-spacing:2px; text-transform:uppercase; margin-bottom:36px; font-family:'Barlow',sans-serif; }
.profile-cards { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
.profile-card { background:#fff; border:1px solid #d4c4a8; padding:32px 40px; cursor:pointer; text-align:center; min-width:170px; position:relative; transition:all 0.2s; border-top:3px solid #d4c4a8; }
.profile-card:hover { border-top-color:#c9a96e; box-shadow:0 4px 20px rgba(0,0,0,0.08); transform:translateY(-2px); }
.profile-avatar { width:60px; height:60px; background:#1a1a1a; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:22px; color:#f5ede3; margin:0 auto 14px; }
.profile-card .name { font-family:'Playfair Display',serif; font-size:19px; color:#1a1a1a; font-weight:700; }
.profile-card .role-label { font-size:11px; color:#888; letter-spacing:1px; text-transform:uppercase; margin-top:5px; }

/* APP */
#app { display:none; min-height:100vh; background:#f5ede3; }
.app-header { background:#1a1a1a; padding:0 20px; display:flex; align-items:center; justify-content:space-between; height:58px; position:sticky; top:0; z-index:100; }
.app-header-logo { height:32px; filter:brightness(0) invert(1); opacity:0.92; }
.header-right { display:flex; align-items:center; gap:12px; }
.user-avatar-sm { width:30px; height:30px; background:#c9a96e; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:12px; color:#1a1a1a; }
.user-name-sm { font-size:13px; color:#f5ede3; font-weight:500; }
.switch-btn { background:transparent; border:1px solid rgba(201,169,110,0.4); color:#c9a96e; font-family:'Barlow',sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase; padding:5px 12px; cursor:pointer; transition:all 0.15s; }
.switch-btn:hover { border-color:#c9a96e; color:#f5ede3; }
.sync-indicator { font-size:10px; color:#888; letter-spacing:1px; }
.sync-indicator.live { color:#2ecc71; }

/* TABS */
.tab-bar { background:#1a1a1a; display:flex; border-bottom:1px solid rgba(201,169,110,0.2); padding:0 16px; overflow-x:auto; }
.tab { padding:13px 16px; font-size:12px; font-weight:500; color:rgba(245,237,227,0.5); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:all 0.15s; text-transform:uppercase; letter-spacing:0.5px; }
.tab:hover { color:#f5ede3; }
.tab.active { color:#c9a96e; border-bottom-color:#c9a96e; }

/* BODY */
.app-body { max-width:920px; margin:0 auto; padding:26px 20px 70px; }
.view-header { margin-bottom:24px; }
.view-title { font-family:'Playfair Display',serif; font-size:26px; color:#1a1a1a; font-weight:700; }
.view-subtitle { font-size:13px; color:#666660; margin-top:3px; }

/* PROGRESS */
.progress-summary { background:#fff; border:1px solid #d4c4a8; padding:18px 22px; margin-bottom:24px; display:flex; align-items:center; gap:18px; }
.progress-bar-wrap { flex:1; height:5px; background:#d4c4a8; border-radius:3px; overflow:hidden; }
.progress-bar-fill { height:100%; background:#c9a96e; border-radius:3px; transition:width 0.4s; }
.progress-text { font-size:12px; color:#666660; }
.progress-pct { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:#c9a96e; min-width:48px; text-align:right; }

/* TASKS */
.task-section { margin-bottom:28px; }
.section-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.section-label { font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:#888; }
.section-rule { flex:1; height:1px; background:#d4c4a8; }
.section-count { font-size:11px; color:#888; }
.task-card { background:#fff; border:1px solid #d4c4a8; border-left:3px solid #d4c4a8; padding:13px 16px; margin-bottom:7px; display:flex; align-items:flex-start; gap:12px; transition:all 0.15s; cursor:pointer; user-select:none; }
.task-card:hover { border-color:#c9a96e; }
.task-card.done { background:#f0f7f3; border-left-color:#2e7d52; opacity:0.85; }
.task-check { width:20px; height:20px; border:2px solid #d4c4a8; border-radius:3px; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; background:white; font-size:12px; }
.task-card.done .task-check { background:#2e7d52; border-color:#2e7d52; color:white; }
.task-text { flex:1; font-size:14px; line-height:1.5; color:#2a2a26; }
.task-card.done .task-text { text-decoration:line-through; color:#888; }

/* CALENDAR */
.cal-nav { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
.cal-nav-btn { background:#1a1a1a; color:#f5ede3; border:none; width:32px; height:32px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
.cal-nav-btn:hover { background:#c9a96e; color:#1a1a1a; }
.cal-month-label { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:#1a1a1a; }
.cal-legend { display:flex; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
.cal-legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:#666660; }
.cal-legend-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:#d4c4a8; border:1px solid #d4c4a8; margin-bottom:24px; }
.cal-day-header { background:#1a1a1a; color:#f5ede3; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; text-align:center; padding:8px 2px; }
.cal-day { background:#fff; min-height:72px; padding:5px; cursor:pointer; transition:background 0.12s; overflow:hidden; }
.cal-day:hover { background:#f5ede3; }
.cal-day.other-month { background:#f0ebe6; }
.cal-day.today { outline:2px solid #c9a96e; outline-offset:-2px; }
.cal-day.selected { background:#ede4d8; }
.cal-day-num { font-size:11px; font-weight:600; color:#666660; margin-bottom:3px; }
.cal-day.today .cal-day-num { color:#c9a96e; font-weight:700; }
.entry-pill { font-size:9px; font-weight:600; padding:1px 4px; border-radius:2px; margin-bottom:2px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:white; }

/* DAY PANEL */
.day-panel { background:#fff; border:1px solid #d4c4a8; margin-bottom:20px; }
.day-panel-header { background:#1a1a1a; padding:14px 18px; display:flex; align-items:center; justify-content:space-between; }
.day-panel-title { font-family:'Playfair Display',serif; font-size:16px; color:#f5ede3; font-weight:700; }
.day-panel-body { padding:18px; }
.add-entry-form { display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:10px; align-items:end; margin-bottom:18px; }
.form-group label { display:block; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:#888; margin-bottom:5px; }
.form-group select, .form-group input { width:100%; border:1px solid #d4c4a8; background:#f9f5f0; font-family:'Barlow',sans-serif; font-size:13px; color:#2a2a26; padding:8px 10px; outline:none; }
.form-group select:focus, .form-group input:focus { border-color:#c9a96e; }
.add-entry-btn { background:#1a1a1a; color:#f5ede3; border:none; font-family:'Barlow',sans-serif; font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:9px 16px; cursor:pointer; transition:all 0.15s; height:36px; white-space:nowrap; }
.add-entry-btn:hover { background:#c9a96e; color:#1a1a1a; }
.entries-list { display:flex; flex-direction:column; gap:8px; }
.entry-row { display:flex; align-items:center; gap:10px; padding:10px 14px; background:#f9f5f0; border:1px solid #d4c4a8; border-left:4px solid #999; }
.entry-person { font-weight:600; font-size:13px; color:#1a1a1a; min-width:90px; }
.entry-job { flex:1; font-size:13px; color:#2a2a26; }
.entry-remove { background:none; border:none; color:#aaa; cursor:pointer; font-size:16px; padding:0 4px; margin-left:auto; }
.entry-remove:hover { color:#c0392b; }
.no-entries { font-size:13px; color:#aaa; font-style:italic; text-align:center; padding:16px 0; }

/* NOTES inside calendar */
.notes-panel { border-top:1px solid #d4c4a8; margin-top:18px; padding-top:18px; }
.notes-panel-label { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#888; margin-bottom:8px; }
.notes-textarea { width:100%; min-height:90px; border:1px solid #d4c4a8; background:#f9f5f0; font-family:'Barlow',sans-serif; font-size:14px; color:#2a2a26; padding:10px 12px; resize:vertical; outline:none; line-height:1.5; }
.notes-textarea:focus { border-color:#c9a96e; }
.notes-save-btn { margin-top:8px; background:#1a1a1a; color:#f5ede3; border:none; font-family:'Barlow',sans-serif; font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; padding:8px 18px; cursor:pointer; transition:all 0.15s; }
.notes-save-btn:hover { background:#c9a96e; color:#1a1a1a; }
.saved-msg { font-size:11px; color:#2e7d52; margin-left:10px; opacity:0; transition:opacity 0.3s; }
.other-notes-box { margin-top:14px; background:#f9f5f0; border:1px solid #d4c4a8; padding:12px 14px; }
.other-notes-label { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#888; margin-bottom:6px; }
.other-notes-text { font-size:13px; color:#555; line-height:1.5; white-space:pre-wrap; }
.other-notes-empty { font-size:13px; color:#aaa; font-style:italic; }

/* TEAM */
.team-card { background:#fff; border:1px solid #d4c4a8; padding:22px; margin-bottom:18px; }
.team-card-header { display:flex; align-items:center; gap:14px; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid #d4c4a8; }
.team-avatar { width:44px; height:44px; background:#1a1a1a; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:18px; color:#f5ede3; }
.team-name { font-family:'Playfair Display',serif; font-size:19px; font-weight:700; color:#1a1a1a; }
.team-roles { font-size:12px; color:#888; margin-top:2px; }
.team-progress-row { display:flex; gap:10px; flex-wrap:wrap; }
.team-stat { flex:1; min-width:90px; background:#f5ede3; border:1px solid #d4c4a8; padding:10px 14px; text-align:center; }
.team-stat-val { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; color:#c9a96e; }
.team-stat-label { font-size:10px; color:#888; letter-spacing:1px; text-transform:uppercase; margin-top:2px; }

/* STREAKS */
.leaderboard-card { background:#1a1a1a; border:2px solid #c9a96e; padding:22px; margin-bottom:22px; }
.leaderboard-title { font-family:'Playfair Display',serif; font-size:20px; color:#c9a96e; font-weight:700; margin-bottom:18px; text-align:center; letter-spacing:1px; }
.leaderboard-row { display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid rgba(201,169,110,0.2); }
.leaderboard-row:last-child { border-bottom:none; }
.leaderboard-pos { font-family:'Playfair Display',serif; font-size:28px; font-weight:900; color:#c9a96e; min-width:36px; }
.leaderboard-pos.second { color:#d4c4a8; }
.leaderboard-avatar { width:44px; height:44px; background:#c9a96e; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:16px; color:#1a1a1a; flex-shrink:0; }
.leaderboard-avatar.second { background:#d4c4a8; }
.leaderboard-info { flex:1; }
.leaderboard-name { font-family:'Playfair Display',serif; font-size:17px; color:#f5ede3; font-weight:700; }
.leaderboard-streaks { display:flex; gap:8px; margin-top:5px; flex-wrap:wrap; }
.streak-badge { display:flex; align-items:center; gap:4px; background:rgba(201,169,110,0.15); border:1px solid rgba(201,169,110,0.3); padding:3px 9px; border-radius:2px; }
.streak-badge.active { background:rgba(201,169,110,0.25); border-color:#c9a96e; }
.streak-val { font-family:'Playfair Display',serif; font-size:14px; font-weight:700; color:#c9a96e; }
.streak-label { font-size:10px; color:#999; letter-spacing:1px; text-transform:uppercase; }
.streak-fire { font-size:13px; }
.leaderboard-score { text-align:right; }
.leaderboard-total { font-family:'Playfair Display',serif; font-size:26px; font-weight:900; color:#c9a96e; line-height:1; }
.leaderboard-total.second { color:#d4c4a8; }
.leaderboard-pts { font-size:10px; color:#999; letter-spacing:1px; text-transform:uppercase; }

/* NUDGE */
.nudge-section { background:#fff; border:1px solid #d4c4a8; padding:22px; margin-bottom:16px; }
.nudge-title { font-family:'Playfair Display',serif; font-size:17px; font-weight:700; color:#1a1a1a; margin-bottom:14px; }
.nudge-messages { max-height:220px; overflow-y:auto; margin-bottom:12px; border:1px solid #d4c4a8; padding:10px; background:#f9f5f0; }
.nudge-bubble { padding:8px 12px; margin-bottom:8px; border-radius:2px; font-size:13px; line-height:1.4; max-width:80%; }
.nudge-bubble.mine { background:#1a1a1a; color:#f5ede3; margin-left:auto; }
.nudge-bubble.theirs { background:#f0ebe6; color:#2a2a26; }
.nudge-bubble-meta { font-size:10px; opacity:0.6; margin-top:3px; }
.nudge-compose { display:flex; gap:8px; }
.nudge-input { flex:1; border:1px solid #d4c4a8; background:#f9f5f0; font-family:'Barlow',sans-serif; font-size:13px; color:#2a2a26; padding:8px 10px; outline:none; }
.nudge-input:focus { border-color:#c9a96e; }
.nudge-btn { background:#1a1a1a; color:#f5ede3; border:none; font-family:'Barlow',sans-serif; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:7px 14px; cursor:pointer; transition:all 0.15s; }
.nudge-btn:hover { background:#c9a96e; color:#1a1a1a; }

/* MANAGE */
.manage-section { background:#fff; border:1px solid #d4c4a8; margin-bottom:20px; }
.manage-header { background:#1a1a1a; padding:12px 18px; }
.manage-header-title { font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#f5ede3; }
.manage-body { padding:18px; }
.member-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #d4c4a8; }
.member-row:last-child { border-bottom:none; }
.member-av { width:34px; height:34px; background:#1a1a1a; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:13px; color:#f5ede3; flex-shrink:0; }
.member-name { font-size:14px; font-weight:600; color:#1a1a1a; }
.member-role { font-size:11px; color:#888; }
.type-badge { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:2px 8px; border-radius:2px; flex-shrink:0; }
.type-badge.director { background:#1a1a1a; color:#f5ede3; }
.type-badge.operative { background:#d4c4a8; color:#2a2a26; }
.rm-btn { background:none; border:1px solid rgba(192,57,43,0.3); color:#c0392b; font-family:'Barlow',sans-serif; font-size:11px; padding:4px 10px; cursor:pointer; transition:all 0.15s; }
.rm-btn:hover { background:#c0392b; color:white; border-color:#c0392b; }
.add-member-form { display:grid; grid-template-columns:1fr 1fr auto; gap:10px; align-items:end; margin-top:16px; padding-top:16px; border-top:1px solid #d4c4a8; }

/* PAY LOG */
.paylog-week-selector { display:flex; align-items:center; gap:14px; margin-bottom:22px; }
.paylog-week-label { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:#1a1a1a; }
.paylog-input { border:1px solid #d4c4a8; background:#f9f5f0; font-family:'Barlow',sans-serif; font-size:13px; color:#2a2a26; padding:5px 7px; width:100%; outline:none; }
.paylog-input:focus { border-color:#c9a96e; }
.paylog-amount { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:#c9a96e; }
.cal-days-info { font-size:11px; color:#2471a3; font-style:italic; }
.paylog-save-row { display:flex; align-items:center; gap:12px; margin-top:4px; margin-bottom:28px; }
.paylog-history { background:#fff; border:1px solid #d4c4a8; }
.paylog-history-header { background:#1a1a1a; padding:12px 16px; }
.paylog-history-title { font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#f5ede3; }
.paylog-hist-week { border-bottom:1px solid #d4c4a8; }
.paylog-hist-week:last-child { border-bottom:none; }
.paylog-hist-week-label { padding:10px 16px; font-weight:600; font-size:13px; color:#888; background:#f5ede3; border-bottom:1px solid #d4c4a8; }
.paylog-hist-row { display:flex; align-items:center; padding:9px 16px; border-bottom:1px solid #d4c4a8; gap:12px; }
.paylog-hist-row:last-child { border-bottom:none; }
.paylog-hist-name { font-weight:600; font-size:13px; color:#1a1a1a; min-width:130px; }
.paylog-hist-detail { font-size:12px; color:#888; flex:1; }
.paylog-hist-amount { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:#c9a96e; }
.basis-badge { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:2px 6px; border-radius:2px; }
.basis-badge.day-rate { background:#c9a96e; color:#1a1a1a; }
.basis-badge.price-work { background:#1a1a1a; color:#f5ede3; }
.ot-label { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#c9a96e; margin-bottom:3px; }

/* SETTINGS */
.settings-section { background:#fff; border:1px solid #d4c4a8; margin-bottom:20px; }
.settings-header { background:#1a1a1a; padding:12px 18px; }
.settings-header-title { font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#f5ede3; }
.settings-body { padding:18px; }
.colour-row { display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid #d4c4a8; }
.colour-row:last-child { border-bottom:none; }
.colour-swatch { width:28px; height:28px; border-radius:4px; flex-shrink:0; border:2px solid rgba(0,0,0,0.1); }
.colour-input { flex:1; border:1px solid #d4c4a8; background:#f9f5f0; font-family:'Barlow',sans-serif; font-size:13px; color:#2a2a26; padding:6px 10px; outline:none; }
.colour-input:focus { border-color:#c9a96e; }

/* NOTIFICATION */
.notif-bar { position:fixed; top:66px; right:16px; background:#1a1a1a; border:1px solid #c9a96e; border-left:4px solid #c9a96e; padding:12px 32px 12px 14px; max-width:280px; z-index:999; box-shadow:0 8px 32px rgba(0,0,0,0.2); }
.notif-from { font-size:10px; color:#c9a96e; letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }
.notif-msg { font-size:13px; color:#f5ede3; line-height:1.4; }
.notif-close { position:absolute; top:8px; right:8px; background:none; border:none; color:#888; cursor:pointer; font-size:14px; }

@media(max-width:600px){
  .profile-cards{flex-direction:column;align-items:center;}
  .app-body{padding:16px 12px 70px;}
  .add-entry-form{grid-template-columns:1fr 1fr;}
  .add-member-form{grid-template-columns:1fr;}
  .team-progress-row{gap:6px;}
  .cal-day{min-height:52px;}
}
</style>
</head>

const todayKey = () => {
  const d = new Date();
  const day = d.getDay(); // 0=Sun, 6=Sat
  if(day === 0) d.setDate(d.getDate() - 2); // Sun -> Fri
  if(day === 6) d.setDate(d.getDate() - 1); // Sat -> Fri
  return d.toISOString().split('T')[0];
};
const weekKey = () => { const d=new Date(),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1); return new Date(new Date().setDate(diff)).toISOString().split('T')[0]; };
const monthKey = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); };
const fmtDate = (y,m,d) => y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
const keys = () => ({daily:todayKey(), weekly:weekKey(), monthly:monthKey()});
const fmtDisplayDate = d => d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
const dateToKey = d => d.toISOString().split('T')[0];

// FIREBASE HELPERS
function dbDoc(path) { const parts=path.split('/'); return db.collection(parts[0]).doc(parts[1]); }
async function fbSet(path,data) { try { await dbDoc(path).set(data); } catch(e) { console.error('Save error:',e); } }
async function fbGet(path,def) { try { const s=await dbDoc(path).get(); return s.exists?s.data():def; } catch(e) { return def; } }
function fbListen(path,callback) { const unsub=dbDoc(path).onSnapshot(snap=>{ if(snap.exists)callback(snap.data()); }); unsubscribers.push(unsub); return unsub; }

function isAllDone(u, freq) {
  const tasks=TASKS[u][freq];
  const k=keys()[freq];
  return tasks.every((_,i)=>taskState[u]?.[freq]?.[k]?.[i]===true);
}

async function checkAndUpdateStreaks() {
  const dk=todayKey(), wk=weekKey(), mk=monthKey();
  if(!streaks[currentUser]) streaks[currentUser]={
    daily:{streak:0,lastKey:'',longestDaily:0},
    weekly:{streak:0,lastKey:'',longestWeekly:0},
    monthly:{streak:0,lastKey:'',longestMonthly:0},
    totalPoints:0
  };
  const s=streaks[currentUser];
  let changed=false;

  if(isAllDone(currentUser,'daily') && s.daily.lastKey!==dk) {
    const yesterday=new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yk=yesterday.toISOString().split('T')[0];
    if(s.daily.lastKey===yk) s.daily.streak++;
    else s.daily.streak=1;
    s.daily.lastKey=dk;
    if(s.daily.streak>(s.daily.longestDaily||0)) s.daily.longestDaily=s.daily.streak;
    changed=true;
  }
  if(isAllDone(currentUser,'weekly') && s.weekly.lastKey!==wk) {
    s.weekly.streak=(s.weekly.streak||0)+1;
    s.weekly.lastKey=wk;
    if(s.weekly.streak>(s.weekly.longestWeekly||0)) s.weekly.longestWeekly=s.weekly.streak;
    changed=true;
  }
  if(isAllDone(currentUser,'monthly') && s.monthly.lastKey!==mk) {
    s.monthly.streak=(s.monthly.streak||0)+1;
    s.monthly.lastKey=mk;
    if(s.monthly.streak>(s.monthly.longestMonthly||0)) s.monthly.longestMonthly=s.monthly.streak;
    changed=true;
  }

  const m=streaks.macauly||{daily:{streak:0},weekly:{streak:0},monthly:{streak:0}};
  const b=streaks.brad||{daily:{streak:0},weekly:{streak:0},monthly:{streak:0}};
  if(!streaks.macauly) streaks.macauly=m;
  if(!streaks.brad) streaks.brad=b;
  streaks.macauly.totalPoints=((streaks.macauly.daily||{}).streak||0)*1+((streaks.macauly.weekly||{}).streak||0)*5+((streaks.macauly.monthly||{}).streak||0)*20;
  streaks.brad.totalPoints=((streaks.brad.daily||{}).streak||0)*1+((streaks.brad.weekly||{}).streak||0)*5+((streaks.brad.monthly||{}).streak||0)*20;

  if(changed) await fbSet('app/streaks',streaks);
}

}

// TASKS
const isTaskDone = (u,f,i) => taskState[u]?.[f]?.[keys()[f]]?.[i]===true;
const getStats = (u,f) => { const t=TASKS[u][f]; return {done:t.filter((_,i)=>isTaskDone(u,f,i)).length,total:t.length}; };

async function toggleTask(u,f,i) {
  if(u!==currentUser) return;
  const k=keys()[f];
  if(!taskState[u]) taskState[u]={};
  if(!taskState[u][f]) taskState[u][f]={};
  if(!taskState[u][f][k]) taskState[u][f][k]={};
  taskState[u][f][k][i]=!taskState[u][f][k][i];
  await fbSet('app/tasks',taskState);
  await checkAndUpdateStreaks();
  renderTasks();
}

function renderTasks() {
  const u=currentUser;
  let html='<div class="view-header"><div class="view-title">'+(u==='macauly'?'Macauly':'Brad')+'\'s Tasks</div>'
    +'<div class="view-subtitle">'+(u==='macauly'?'Operations \u00b7 Sales \u00b7 Marketing':'General \u00b7 Site \u00b7 Finance')+'</div></div>';

  ['daily','weekly','monthly'].forEach(freq=>{
    const tasks=TASKS[u][freq], st=getStats(u,freq);
    html+='<div class="task-section"><div class="section-header"><div class="section-label">'+freq.charAt(0).toUpperCase()+freq.slice(1)+'</div><div class="section-rule"></div><div class="section-count">'+st.done+'/'+st.total+'</div></div>';
    tasks.forEach((text,idx)=>{
      const done=isTaskDone(u,freq,idx);
      html+='<div class="task-card'+(done?' done':'')+'" onclick="toggleTask(\''+u+'\',\''+freq+'\','+idx+')"><div class="task-check">'+(done?'&#x2713;':'')+'</div><div class="task-text">'+text+'</div></div>';
    });
    html+='</div>';
  });
  document.getElementById('view-tasks').innerHTML=html;
}

async function copyPrevDay(targetDateKey,sourceDateKey) {
  const sourceEntries=calEntries[sourceDateKey]||[];
  if(!sourceEntries.length) return;
  const existing=calEntries[targetDateKey]||[];
  const toAdd=sourceEntries.filter(se=>!existing.some(ex=>ex.person===se.person&&ex.job===se.job));
  calEntries[targetDateKey]=[...existing,...toAdd];
  await fbSet('app/calendar',calEntries);
  renderCalendar();
}

async function addCalEntry(){
  const person=document.getElementById('cal-person').value;
  const job=document.getElementById('cal-job').value.trim();
  const colourId=parseInt(document.getElementById('cal-colour').value);
  if(!job){document.getElementById('cal-job').focus();return;}
  if(!calEntries[selectedCalDate]) calEntries[selectedCalDate]=[];
  calEntries[selectedCalDate].push({person,job,colourId});
  await fbSet('app/calendar',calEntries);
  renderCalendar();
}

async function removeCalEntry(idx){
  calEntries[selectedCalDate].splice(idx,1);
  await fbSet('app/calendar',calEntries);
  renderCalendar();
}

// PAY LOG
function getPayWeekKey(offset){
  const d=new Date();d.setDate(d.getDate()+offset*7);
  const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);
  return new Date(d.setDate(diff)).toISOString().split('T')[0];
}
function getPayWeekLabel(offset){
  const wk=getPayWeekKey(offset);
  const mon=new Date(wk+'T12:00:00'),fri=new Date(mon);fri.setDate(fri.getDate()+4);
  const fmt=d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  return offset===0?'This Week ('+fmt(mon)+' \u2013 '+fmt(fri)+')':fmt(mon)+' \u2013 '+fmt(fri);
}
function getColourPayDays(colourId){
  const c=colourLabels.find(c=>c.id===colourId);
  if(c&&c.payDays!==undefined) return c.payDays;
  const d=DEFAULT_COLOURS.find(c=>c.id===colourId);
  return d?(d.payDays||0):0;
}
function getCalDaysForWeek(personName,weekStartKey){
  const mon=new Date(weekStartKey+'T12:00:00');
  let count=0;
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(d.getDate()+i);
    const dk=d.toISOString().split('T')[0];
    const entries=calEntries[dk]||[];
    entries.forEach(e=>{ if(e.person===personName) count+=getColourPayDays(e.colourId||0); });
  }
  return count;
}
function calcEntryAmount(e){
  let base=0;
  const days=parseFloat(e.days), rate=parseFloat(e.rate), price=parseFloat(e.priceTotal);
  if(e.basis==='day-rate'&&!isNaN(days)&&!isNaN(rate)) base=days*rate;
  else if(e.basis==='price-work'&&!isNaN(price)) base=price;
  const ot=(parseFloat(e.otHours)||0)*(parseFloat(e.otRate)||0);
  return base+ot;
}

      const wkEntries=payLog[wkKey]||[], wkTotal=wkEntries.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
      const mon=new Date(wkKey+'T12:00:00'),fri=new Date(mon);fri.setDate(fri.getDate()+4);
      const fmt=d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
      html+='<div class="paylog-hist-week"><div class="paylog-hist-week-label">w/c '+fmt(mon)+' \u2014 Total: \u00a3'+wkTotal.toFixed(2)+'</div>'
        +wkEntries.filter(e=>calcEntryAmount(e)>0).map(e=>'<div class="paylog-hist-row">'
          +'<div class="paylog-hist-name">'+e.name+'</div>'
          +'<div class="paylog-hist-detail">'
            +(e.basis==='day-rate'&&e.days?e.days+' days @ \u00a3'+e.rate+'/day':'')
            +(e.basis==='price-work'&&e.priceTotal?'Price work \u00a3'+e.priceTotal:'')
            +'<span class="basis-badge '+e.basis+'" style="margin-left:6px;">'+(e.basis==='day-rate'?'Day Rate':'Price Work')+'</span>'
            +((parseFloat(e.otHours)||0)>0?'<span style="color:#c9a96e;margin-left:8px;">+'+e.otHours+'hr OT</span>':'')
            +(e.note?'<span style="color:#888;margin-left:8px;">'+e.note+'</span>':'')
          +'</div>'
          +'<div class="paylog-hist-amount">\u00a3'+calcEntryAmount(e).toFixed(2)+'</div>'
        +'</div>').join('')
      +'</div>';
    });
    html+='</div>';
  }

  document.getElementById('view-paylog').innerHTML=html;
  if(_payFocusId){
    const el=document.querySelector('[data-fieldkey="'+_payFocusId+'"]');
    if(el){el.focus();el.value=_payFocusVal||el.value;_payFocusId=null;}
  }
}

function changePayWeek(dir){payLogWeekOffset+=dir;renderPayLog();}

function ensurePayEntry(wk,personId){
  if(!payLog[wk]) payLog[wk]=[];
  let entry=payLog[wk].find(e=>e.personId===personId);
  if(!entry){
    const m=teamMembers.find(m=>m.id===personId)||{};
    entry={personId,name:m.name||'',role:m.role||'',days:'',rate:'',basis:'day-rate',priceTotal:'',otHours:'',otRate:'',note:'',amount:0};
    payLog[wk].push(entry);
  }
  if(!entry.basis) entry.basis='day-rate';
  return entry;
}

function setPayBasis(wk,personId,basis){
  const entry=ensurePayEntry(wk,personId);
  entry.basis=basis;
  entry.amount=calcEntryAmount(entry);
  renderPayLog();
}

function updatePayField(wk,personId,field,val){
  const entry=ensurePayEntry(wk,personId);
  entry[field]=val;
  entry.amount=calcEntryAmount(entry);
  renderPayLog();
}

async function savePayLog(wk){
  await fbSet('app/paylog',payLog);
  const msg=document.getElementById('pay-saved-msg');
  if(msg){msg.style.opacity='1';setTimeout(()=>msg.style.opacity='0',2000);}
}

// SETTINGS
function renderSettings(){
  const merged=DEFAULT_COLOURS.map(dc=>{
    const loaded=colourLabels.find(c=>c.id===dc.id);
    return loaded?Object.assign({},dc,loaded):dc;
  });
  let html='<div class="view-header"><div class="view-title">Settings</div><div class="view-subtitle">Colour labels, team management, and preferences</div></div>'
    +'<div class="settings-section"><div class="settings-header"><div class="settings-header-title">Calendar Colour Labels</div></div><div class="settings-body">';
  merged.forEach(c=>{
    const pd=c.payDays!==undefined?c.payDays:0;
    html+='<div class="colour-row">'
      +'<div class="colour-swatch" style="background:'+c.hex+'"></div>'
      +'<input class="colour-input" type="text" value="'+c.label+'" placeholder="Name this colour..." oninput="updateColourLabel('+c.id+',this.value)"/>'
      +'<div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:'+(pd>0?'#2e7d52':'#888')+';min-width:60px;text-align:right;">'+(pd===1?'Full day':pd===0.5?'Half day':'No pay')+'</div>'
    +'</div>';
  });
  html+='<div style="font-size:12px;color:#555;margin-top:12px;padding:10px;background:#f5ede3;border:1px solid #d4c4a8;">Green = full day pay &nbsp;|&nbsp; Burgundy = 0.5 days pay &nbsp;|&nbsp; All other colours = no pay counted</div>'
    +'<div style="display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap;">'
    +'<button class="notes-save-btn" onclick="saveColourLabels()">Save Labels</button>'
    +'<button onclick="resetColourDefaults()" style="background:none;border:1px solid #c0392b;color:#c0392b;font-family:\'Barlow\',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:8px 18px;cursor:pointer;">Reset to Defaults</button>'
    +'<span class="saved-msg" id="colours-saved-msg">Saved &#x2713;</span>'
    +'</div></div></div>';

  // Manage team in settings
  const manageDiv=document.createElement('div');
  renderManage(manageDiv);
  html+=manageDiv.innerHTML;

  document.getElementById('view-settings').innerHTML=html;
}

function updateColourLabel(id,val){
  colourLabels=colourLabels.map(c=>c.id===id?Object.assign({},c,{label:val}):c);
}

async function resetColourDefaults(){
  colourLabels=DEFAULT_COLOURS.map(c=>Object.assign({},c));
  await fbSet('app/colours',{list:colourLabels});
  renderSettings();
  renderCalendar();
}

async function saveColourLabels(){
  const toSave=colourLabels.map(c=>{
    const def=DEFAULT_COLOURS.find(d=>d.id===c.id);
    return Object.assign({},c,{payDays:def?def.payDays:(c.payDays||0)});
  });
  colourLabels=toSave;
  await fbSet('app/colours',{list:toSave});
  const msg=document.getElementById('colours-saved-msg');
  if(msg){msg.style.opacity='1';setTimeout(()=>msg.style.opacity='0',2000);}
}

// NOTIFICATIONS
function showNotif(from,msg){
  document.getElementById('notif-from').textContent=from;
  document.getElementById('notif-msg').textContent=msg;
  const el=document.getElementById('notification');
  el.style.display='block';
  setTimeout(()=>el.style.display='none',5000);
}

// NAVIGATION
const views=['tasks','calendar','paylog','team','settings'];
function showView(view,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(tab) tab.classList.add('active');
  views.forEach(v=>document.getElementById('view-'+v).style.display=v===view?'block':'none');
  if(view==='tasks') renderTasks();
  if(view==='calendar') renderCalendar();
  if(view==='paylog') renderPayLog();
  if(view==='team') renderTeam();
  if(view==='settings') renderSettings();
}

// AUTH
async function login(user){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  currentUser=user;
  document.getElementById('header-avatar').textContent=user==='macauly'?'MP':'BP';
  document.getElementById('header-name').textContent=user==='macauly'?'Macauly':'Brad';
  await loadAll();
  lastNudgeCount=nudges.filter(n=>n.to===currentUser&&n.date===todayKey()).length;
  await checkAndUpdateStreaks();
  showView('tasks',null);
  document.querySelectorAll('.tab')[0].classList.add('active');
}

function logout(){
  unsubscribers.forEach(u=>u());
  unsubscribers=[];
  currentUser=null;
  calYear=undefined;calMonth=undefined;selectedCalDate=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}

window.login=login; window.logout=logout; window.showView=showView;
window.toggleTask=toggleTask;
window.changeMonth=changeMonth; window.selectCalDay=selectCalDay;
window.addCalEntry=addCalEntry; window.removeCalEntry=removeCalEntry;
window.copyPrevDay=copyPrevDay; window.saveNote=saveNote;
window.sendNudge=sendNudge;
window.addMember=addMember; window.removeMember=removeMember;
window.startMemberEdit=startMemberEdit; window.cancelMemberEdit=cancelMemberEdit; window.saveMemberEdit=saveMemberEdit;
window.changePayWeek=changePayWeek; window.updatePayField=updatePayField; window.savePayLog=savePayLog;
window.setPayBasis=setPayBasis; window.ensurePayEntry=ensurePayEntry;
window.updateColourLabel=updateColourLabel; window.saveColourLabels=saveColourLabels;
window.resetColourDefaults=resetColourDefaults;
</script>
