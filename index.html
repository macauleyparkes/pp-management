<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perry & Parkes — Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #1a1a18;
    --black2: #222220;
    --beige: #e8dcc8;
    --beige-light: #f5f0e8;
    --beige-mid: #d4c4a8;
    --gold: #b8965a;
    --white: #fdfaf5;
    --red: #c0392b;
    --green: #2e7d52;
    --green-light: #e8f5ee;
    --text: #2a2a26;
    --text-mid: #666660;
    --text-light: #999990;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); font-family: 'Barlow', sans-serif; min-height: 100vh; color: var(--text); }
  #login-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; background: var(--black); background-image: radial-gradient(ellipse at 20% 50%, rgba(184,150,90,0.06) 0%, transparent 60%); }
  .login-logo { text-align: center; margin-bottom: 48px; }
  .login-logo .company-name { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 36px; color: var(--beige); letter-spacing: 3px; }
  .login-logo .company-sub { font-size: 11px; color: var(--text-light); letter-spacing: 5px; text-transform: uppercase; margin-top: 6px; }
  .login-logo .gold-rule { width: 60px; height: 2px; background: var(--gold); margin: 14px auto 0; }
  .login-title { font-size: 13px; color: var(--text-light); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px; }
  .profile-cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
  .profile-card { background: var(--black2); border: 1px solid rgba(184,150,90,0.2); padding: 32px 40px; cursor: pointer; transition: all 0.2s; text-align: center; min-width: 170px; position: relative; }
  .profile-card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:var(--gold); transform:scaleX(0); transition:transform 0.2s; }
  .profile-card:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .profile-card:hover::before { transform: scaleX(1); }
  .profile-avatar { width:60px; height:60px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:22px; color:var(--black); margin:0 auto 14px; }
  .profile-card .name { font-family:'Playfair Display',serif; font-size:19px; color:var(--beige); font-weight:700; }
  .profile-card .role-label { font-size:11px; color:var(--text-light); letter-spacing:1px; text-transform:uppercase; margin-top:5px; }
  #app { display:none; min-height:100vh; background:var(--beige-light); }
  .app-header { background:var(--black); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:60px; border-bottom:2px solid var(--gold); position:sticky; top:0; z-index:100; }
  .header-logo { font-family:'Playfair Display',serif; font-weight:900; font-size:17px; color:var(--beige); letter-spacing:2px; }
  .header-logo span { color:var(--gold); }
  .header-right { display:flex; align-items:center; gap:14px; }
  .user-avatar-sm { width:30px; height:30px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:12px; color:var(--black); }
  .user-name-sm { font-size:13px; color:var(--beige); font-weight:500; }
  .switch-btn { background:transparent; border:1px solid rgba(184,150,90,0.4); color:var(--text-light); font-family:'Barlow',sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase; padding:5px 12px; cursor:pointer; transition:all 0.15s; }
  .switch-btn:hover { border-color:var(--gold); color:var(--gold); }
  .tab-bar { background:var(--black2); display:flex; border-bottom:1px solid rgba(184,150,90,0.15); padding:0 24px; overflow-x:auto; }
  .tab { padding:13px 18px; font-size:13px; font-weight:500; color:var(--text-light); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:all 0.15s; letter-spacing:0.5px; }
  .tab:hover { color:var(--beige); }
  .tab.active { color:var(--gold); border-bottom-color:var(--gold); }
  .app-body { max-width: 920px; margin: 0 auto; padding: 26px 20px 70px; }
  .view-header { margin-bottom: 24px; }
  .view-title { font-family:'Playfair Display',serif; font-size:26px; color:var(--black); font-weight:700; }
  .view-subtitle { font-size:13px; color:var(--text-mid); margin-top:3px; }
  .progress-summary { background:var(--white); border:1px solid var(--beige-mid); padding:18px 22px; margin-bottom:24px; display:flex; align-items:center; gap:18px; }
  .progress-bar-wrap { flex:1; height:5px; background:var(--beige-mid); border-radius:3px; overflow:hidden; }
  .progress-bar-fill { height:100%; background:var(--gold); border-radius:3px; transition:width 0.4s; }
  .progress-text { font-size:12px; color:var(--text-mid); white-space:nowrap; }
  .progress-pct { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:var(--gold); min-width:48px; text-align:right; }
  .task-section { margin-bottom:28px; }
  .section-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .section-label { font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--text-light); }
  .section-rule { flex:1; height:1px; background:var(--beige-mid); }
  .section-count { font-size:11px; color:var(--text-light); }
  .task-card { background:var(--white); border:1px solid var(--beige-mid); border-left:3px solid var(--beige-mid); padding:13px 16px; margin-bottom:7px; display:flex; align-items:flex-start; gap:12px; transition:all 0.15s; cursor:pointer; user-select:none; }
  .task-card:hover { border-color:var(--gold); box-shadow:0 2px 8px rgba(0,0,0,0.06); }
  .task-card.done { background:var(--green-light); border-left-color:var(--green); opacity:0.85; }
  .task-check { width:20px; height:20px; border:2px solid var(--beige-mid); border-radius:3px; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; background:white; font-size:12px; }
  .task-card.done .task-check { background:var(--green); border-color:var(--green); color:white; }
  .task-text { flex:1; font-size:14px; line-height:1.5; color:var(--text); }
  .task-card.done .task-text { text-decoration:line-through; color:var(--text-mid); }
  .notes-panel { background:var(--white); border:1px solid var(--beige-mid); margin-bottom:28px; }
  .notes-header { background:var(--black); padding:12px 18px; display:flex; align-items:center; justify-content:space-between; }
  .notes-header-title { font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--beige); }
  .notes-date { font-size:11px; color:var(--text-light); }
  .notes-body { padding:16px; }
  .notes-textarea { width:100%; min-height:90px; border:1px solid var(--beige-mid); background:var(--beige-light); font-family:'Barlow',sans-serif; font-size:14px; color:var(--text); padding:10px 12px; resize:vertical; outline:none; line-height:1.5; }
  .notes-textarea:focus { border-color:var(--gold); }
  .notes-save-btn { margin-top:8px; background:var(--black); color:var(--beige); border:none; font-family:'Barlow',sans-serif; font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; padding:8px 18px; cursor:pointer; transition:all 0.15s; }
  .notes-save-btn:hover { background:var(--gold); color:var(--black); }
  .notes-saved-msg { font-size:11px; color:var(--green); margin-left:10px; opacity:0; transition:opacity 0.3s; }
  .other-notes-box { border-top:1px solid var(--beige-mid); padding:14px 16px; background:var(--beige-light); }
  .other-notes-label { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-light); margin-bottom:6px; }
  .other-notes-text { font-size:13px; color:var(--text-mid); line-height:1.5; white-space:pre-wrap; }
  .other-notes-empty { font-size:13px; color:var(--text-light); font-style:italic; }
  .cal-nav { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
  .cal-nav-btn { background:var(--black); color:var(--beige); border:none; width:32px; height:32px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:background 0.15s; }
  .cal-nav-btn:hover { background:var(--gold); color:var(--black); }
  .cal-month-label { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:var(--black); }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--beige-mid); border:1px solid var(--beige-mid); margin-bottom:24px; }
  .cal-day-header { background:var(--black); color:var(--beige); font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; text-align:center; padding:8px 2px; }
  .cal-day { background:var(--white); min-height:70px; padding:6px; cursor:pointer; transition:background 0.12s; }
  .cal-day:hover { background:var(--beige-light); }
  .cal-day.other-month { background:#f0ece4; }
  .cal-day.today { outline:2px solid var(--gold); outline-offset:-2px; }
  .cal-day.selected { background:var(--beige); }
  .cal-day-num { font-size:12px; font-weight:600; color:var(--text-mid); margin-bottom:4px; }
  .cal-day.today .cal-day-num { color:var(--gold); font-weight:700; }
  .entry-pill { background:var(--gold); color:var(--black); font-size:9px; font-weight:600; padding:1px 4px; border-radius:2px; margin-bottom:2px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .entry-pill.price { background:var(--black); color:var(--beige); }
  .day-panel { background:var(--white); border:1px solid var(--beige-mid); }
  .day-panel-header { background:var(--black); padding:14px 18px; }
  .day-panel-title { font-family:'Playfair Display',serif; font-size:16px; color:var(--beige); font-weight:700; }
  .day-panel-body { padding:18px; }
  .add-entry-form { display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:10px; align-items:end; margin-bottom:18px; }
  .form-group label { display:block; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text-light); margin-bottom:5px; }
  .form-group select, .form-group input { width:100%; border:1px solid var(--beige-mid); background:var(--beige-light); font-family:'Barlow',sans-serif; font-size:13px; color:var(--text); padding:8px 10px; outline:none; }
  .form-group select:focus, .form-group input:focus { border-color:var(--gold); }
  .add-entry-btn { background:var(--black); color:var(--beige); border:none; font-family:'Barlow',sans-serif; font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:9px 16px; cursor:pointer; white-space:nowrap; transition:all 0.15s; height:36px; }
  .add-entry-btn:hover { background:var(--gold); color:var(--black); }
  .entries-list { display:flex; flex-direction:column; gap:8px; }
  .entry-row { display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--beige-light); border:1px solid var(--beige-mid); }
  .entry-person { font-weight:600; font-size:13px; color:var(--black); min-width:80px; }
  .entry-job { flex:1; font-size:13px; color:var(--text); }
  .entry-type { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:2px 7px; border-radius:2px; }
  .entry-type.day-rate { background:var(--gold); color:var(--black); }
  .entry-type.price-work { background:var(--black); color:var(--beige); }
  .entry-remove { background:none; border:none; color:var(--text-light); cursor:pointer; font-size:16px; padding:0 4px; transition:color 0.15s; margin-left:auto; }
  .entry-remove:hover { color:var(--red); }
  .no-entries { font-size:13px; color:var(--text-light); font-style:italic; text-align:center; padding:16px 0; }
  .team-card { background:var(--white); border:1px solid var(--beige-mid); padding:22px; margin-bottom:18px; }
  .team-card-header { display:flex; align-items:center; gap:14px; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--beige-mid); }
  .team-avatar { width:44px; height:44px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:18px; color:var(--black); }
  .team-name { font-family:'Playfair Display',serif; font-size:19px; font-weight:700; color:var(--black); }
  .team-roles { font-size:12px; color:var(--text-mid); margin-top:2px; }
  .team-progress-row { display:flex; gap:10px; flex-wrap:wrap; }
  .team-stat { flex:1; min-width:100px; background:var(--beige-light); border:1px solid var(--beige-mid); padding:10px 14px; text-align:center; }
  .team-stat-val { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; color:var(--gold); }
  .team-stat-label { font-size:10px; color:var(--text-mid); letter-spacing:1px; text-transform:uppercase; margin-top:2px; }
  .missed-tasks-list { margin-top:14px; }
  .missed-item { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--beige-mid); font-size:13px; color:var(--text); }
  .missed-item:last-child { border-bottom:none; }
  .missed-dot { width:7px; height:7px; background:var(--red); border-radius:50%; flex-shrink:0; }
  .missed-freq { font-size:10px; color:var(--text-light); letter-spacing:1px; text-transform:uppercase; margin-left:auto; flex-shrink:0; }
  .nudge-section { background:var(--white); border:1px solid var(--beige-mid); padding:22px; margin-bottom:22px; }
  .nudge-title { font-family:'Playfair Display',serif; font-size:17px; font-weight:700; color:var(--black); margin-bottom:14px; }
  .nudge-user-row { display:flex; align-items:flex-start; gap:12px; padding:13px 0; border-bottom:1px solid var(--beige-mid); }
  .nudge-user-row:last-child { border-bottom:none; }
  .nudge-avatar { width:38px; height:38px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:15px; color:var(--black); flex-shrink:0; }
  .nudge-info { flex:1; }
  .nudge-name { font-weight:600; font-size:13px; color:var(--black); }
  .nudge-stats { font-size:12px; color:var(--text-mid); margin-top:2px; }
  .nudge-btn { background:var(--black); color:var(--beige); border:none; font-family:'Barlow',sans-serif; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:7px 14px; cursor:pointer; transition:all 0.15s; align-self:center; }
  .nudge-btn:hover { background:var(--gold); color:var(--black); }
  .nudge-btn:disabled { opacity:0.4; cursor:default; }
  .manage-section { background:var(--white); border:1px solid var(--beige-mid); margin-bottom:20px; }
  .manage-header { background:var(--black); padding:12px 18px; }
  .manage-header-title { font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--beige); }
  .manage-body { padding:18px; }
  .team-member-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--beige-mid); }
  .team-member-row:last-child { border-bottom:none; }
  .member-avatar-sm { width:34px; height:34px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:13px; color:var(--black); flex-shrink:0; }
  .member-info { flex:1; }
  .member-name { font-size:14px; font-weight:600; color:var(--black); }
  .member-role { font-size:11px; color:var(--text-mid); }
  .member-type-badge { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:2px 8px; border-radius:2px; }
  .member-type-badge.director { background:var(--black); color:var(--beige); }
  .member-type-badge.operative { background:var(--beige-mid); color:var(--text); }
  .remove-member-btn { background:none; border:1px solid rgba(192,57,43,0.3); color:var(--red); font-family:'Barlow',sans-serif; font-size:11px; padding:4px 10px; cursor:pointer; transition:all 0.15s; }
  .remove-member-btn:hover { background:var(--red); color:white; border-color:var(--red); }
  .add-member-form { display:grid; grid-template-columns:1fr 1fr auto; gap:10px; align-items:end; margin-top:16px; padding-top:16px; border-top:1px solid var(--beige-mid); }
  .nudge-notification { position:fixed; top:76px; right:20px; background:var(--black); border:1px solid var(--gold); border-left:4px solid var(--gold); padding:14px 36px 14px 16px; max-width:300px; z-index:999; animation:slideIn 0.3s ease; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
  .notif-from { font-size:10px; color:var(--gold); letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
  .notif-msg { font-size:13px; color:var(--beige); line-height:1.4; }
  .notif-close { position:absolute; top:10px; right:10px; background:none; border:none; color:var(--text-light); cursor:pointer; font-size:15px; }
  @keyframes slideIn { from{transform:translateX(20px);opacity:0;} to{transform:translateX(0);opacity:1;} }
  .paylog-week-selector { display:flex; align-items:center; gap:14px; margin-bottom:22px; }
  .paylog-week-label { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:var(--black); }
  .paylog-table { width:100%; border-collapse:collapse; background:var(--white); border:1px solid var(--beige-mid); margin-bottom:20px; }
  .paylog-table th { background:var(--black); color:var(--beige); font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; padding:10px 12px; text-align:left; }
  .paylog-table td { padding:10px 12px; border-bottom:1px solid var(--beige-mid); font-size:13px; color:var(--text); vertical-align:middle; }
  .paylog-table tr:last-child td { border-bottom:none; }
  .paylog-table tr:hover td { background:var(--beige-light); }
  .paylog-input { border:1px solid var(--beige-mid); background:var(--beige-light); font-family:'Barlow',sans-serif; font-size:13px; color:var(--text); padding:6px 8px; width:100%; outline:none; }
  .paylog-input:focus { border-color:var(--gold); }
  .paylog-select { border:1px solid var(--beige-mid); background:var(--beige-light); font-family:'Barlow',sans-serif; font-size:12px; color:var(--text); padding:6px 8px; width:100%; outline:none; }
  .paylog-total-row td { background:var(--beige); font-weight:700; border-top:2px solid var(--gold); }
  .paylog-amount { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:var(--gold); }
  .paylog-total-row .paylog-amount { font-size:17px; color:var(--black); }
  .paylog-save-row { display:flex; align-items:center; gap:12px; margin-top:4px; }
  .paylog-history { background:var(--white); border:1px solid var(--beige-mid); }
  .paylog-history-header { background:var(--black2); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; }
  .paylog-history-title { font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--beige); }
  .paylog-history-body { padding:0; }
  .paylog-hist-week { border-bottom:1px solid var(--beige-mid); }
  .paylog-hist-week:last-child { border-bottom:none; }
  .paylog-hist-week-label { padding:10px 16px; font-weight:600; font-size:13px; color:var(--text-mid); background:var(--beige-light); border-bottom:1px solid var(--beige-mid); }
  .paylog-hist-row { display:flex; align-items:center; padding:9px 16px; border-bottom:1px solid var(--beige-mid); gap:12px; }
  .paylog-hist-row:last-child { border-bottom:none; }
  .paylog-hist-name { font-weight:600; font-size:13px; color:var(--black); min-width:130px; }
  .paylog-hist-detail { font-size:12px; color:var(--text-mid); flex:1; }
  .paylog-hist-amount { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:var(--gold); }
  .basis-badge { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:2px 6px; border-radius:2px; }
  .basis-badge.day-rate { background:var(--gold); color:var(--black); }
  .basis-badge.price-work { background:var(--black); color:var(--beige); }
  @media(max-width:600px){
    .profile-cards{flex-direction:column;align-items:center;}
    .app-body{padding:16px 12px 70px;}
    .add-entry-form{grid-template-columns:1fr 1fr;}
    .add-member-form{grid-template-columns:1fr;}
    .team-progress-row{gap:6px;}
    .cal-day{min-height:50px;}
    .paylog-table th:nth-child(5),.paylog-table td:nth-child(5){display:none;}
  }
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-logo">
    <div class="company-name">PERRY & PARKES</div>
    <div class="company-sub">Contractors Ltd</div>
    <div class="gold-rule"></div>
  </div>
  <div class="login-title">Who's logging in?</div>
  <div class="profile-cards">
    <div class="profile-card" onclick="login('macauly')">
      <div class="profile-avatar">MP</div>
      <div class="name">Macauly</div>
      <div class="role-label">Operations · Sales · Marketing</div>
    </div>
    <div class="profile-card" onclick="login('brad')">
      <div class="profile-avatar">BP</div>
      <div class="name">Brad</div>
      <div class="role-label">General · Site · Finance</div>
    </div>
  </div>
</div>
<div id="app">
  <div class="app-header">
    <div class="header-logo">P<span>&</span>P</div>
    <div class="header-right">
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="user-avatar-sm" id="header-avatar"></div>
        <div class="user-name-sm" id="header-name"></div>
      </div>
      <button class="switch-btn" onclick="logout()">Switch</button>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" onclick="showView('tasks',this)">My Tasks</div>
    <div class="tab" onclick="showView('notes',this)">Daily Notes</div>
    <div class="tab" onclick="showView('calendar',this)">Calendar</div>
    <div class="tab" onclick="showView('team',this)">Team View</div>
    <div class="tab" onclick="showView('nudge',this)">Nudge 👋</div>
    <div class="tab" onclick="showView('manage',this)">Manage Team</div>
    <div class="tab" onclick="showView('paylog',this)">Pay Log 💷</div>
  </div>
  <div class="app-body">
    <div id="view-tasks"></div>
    <div id="view-notes" style="display:none"></div>
    <div id="view-calendar" style="display:none"></div>
    <div id="view-team" style="display:none"></div>
    <div id="view-nudge" style="display:none"></div>
    <div id="view-manage" style="display:none"></div>
    <div id="view-paylog" style="display:none"></div>
  </div>
</div>
<div id="notification" style="display:none" class="nudge-notification">
  <button class="notif-close" onclick="document.getElementById('notification').style.display='none'">✕</button>
  <div class="notif-from" id="notif-from"></div>
  <div class="notif-msg" id="notif-msg"></div>
</div>
<script>
const TASKS = {
  macauly: {
    daily: ["Check in with operatives on site — any issues, blockers, or changes needed","Monitor progress against the programme on active jobs","Deal with any on-site problems as they come up","Make sure the right PPE, RAMS, and inductions are in place for anyone on site","Log anything that needs flagging — near misses, defects, instructions received","Respond to any new enquiries same day","Chase any outstanding quotes that haven't had a response","Keep an eye on the pipeline — what's live, submitted, won or lost","Check LinkedIn and Instagram — respond to any comments or messages","If something notable happens on site today — get a photo for content"],
    weekly: ["Walk each live job — quality check, snagging, review against scope","Review upcoming work for the following week — is the programme realistic?","Check subcontractors are performing and compliant (CSCS, insurance, RAMS)","Raise any variation or extra work so it gets captured before invoicing","Review H&S paperwork is current and on site","Review all open quotes — what needs chasing, what's gone quiet?","Do any site visits needed to measure up or price new work","Send out any quotes that are ready — check figures, margins, and scope first","Log the week's activity — enquiries in, quotes sent, jobs won or lost","Follow up on outreach emails or leads from the week before","Post at least once on LinkedIn","Post at least once on Instagram","Review engagement from the week — what's landed well?","Check the website for anything that needs updating"],
    monthly: ["Review all live job files — are programmes and correspondence up to date?","Check RAMS and method statements are still relevant to current works","Review operative certifications — any CSCS, IPAF tickets coming up for renewal?","Feed into the programme for upcoming jobs — what resource do we need?","Review win/loss rate — are we winning enough at the right margins?","Look at the pipeline for the next 4–8 weeks","Do proactive outreach to contractors or clients you haven't heard from","Review your pricing — are material and labour costs still accurate?","Update the target contractor list","Review the month's marketing activity — are we posting consistently?","Add at least one new project or case study to the website","Plan content for the month ahead"]
  },
  brad: {
    daily: ["Set the day up for the team — who's doing what, on which job","Monitor progress on all live sites — are we on track?","Make sure all operatives and subbies have been inducted and have RAMS in place","Deal with any day-to-day site issues — materials, access, other trades","Record any relevant site activity — progress, instructions, issues or delays","Stay across any urgent business issues needing a director-level decision","Quick daily check-in with Macauly","Check Xero — payments received, anything overdue, anything needing attention","Make sure new purchase invoices or receipts are logged"],
    weekly: ["Review the programme across all live jobs — are we on track?","Coordinate labour for the week ahead — right people, right jobs, right days","Check in with subbies — are they on programme and meeting the standard?","Flag any extras or variations to Macauly before they get missed","Carry out or arrange a quality check on each live job","Make sure site files, paperwork, and H&S records are up to date","Sit down with Macauly for a proper weekly review","Check in with Daisy on any outstanding invoices or admin needing sign-off","Stay aware of the sales pipeline — what's been quoted, won, or coming up","Raise any invoices for work completed or milestones hit during the week","Chase any outstanding payments that are overdue","Review cash flow for the week ahead","Process any subcontractor or supplier invoices due for payment","File any paperwork, contracts, or correspondence that's come in"],
    monthly: ["Review upcoming jobs and plan the programme in advance","Assess subcontractor performance — who's working well, who isn't?","Feed resource requirements into Macauly for planning","Review any snagging or defects from completed jobs — are they closed out?","Check plant, tools, and equipment — anything needing servicing or replacing?","Review the company's financial position with Macauly and Daisy","Look at the business as a whole — are we growing in the right direction?","Review any compliance or legal matters — insurance renewals, accreditations","Assess resource — do we have the right people and are they performing?","Set priorities for the month ahead across operations and sales","Full cash flow review — what's the position for the next 4–8 weeks?","Reconcile Xero — make sure everything is coded correctly","Review job costs against budgets — are we making the margins we quoted?","Submit CIS returns and make sure deductions are recorded correctly","Check VAT position ahead of the next VAT return"]
  }
};

let currentUser=null,taskState={},notes={},calEntries={},teamMembers=[],nudges=[],payLog={},calYear,calMonth,selectedCalDate=null,editingMemberIdx=-1,payLogWeekOffset=0;

const todayKey=()=>new Date().toISOString().split('T')[0];
const weekKey=()=>{const d=new Date(),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);return new Date(new Date().setDate(diff)).toISOString().split('T')[0];};
const monthKey=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;};
const fmtDate=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const keys=()=>({daily:todayKey(),weekly:weekKey(),monthly:monthKey()});

async function loadAll(){
  const load=async(k,def)=>{try{const r=await window.storage.get(k);return r?JSON.parse(r.value):def;}catch(e){return def;}};
  taskState=await load('pp_tasks',{});
  notes=await load('pp_notes',{});
  calEntries=await load('pp_cal',{});
  nudges=await load('pp_nudges',[]);
  payLog=await load('pp_paylog',{});
  teamMembers=await load('pp_team',[
    {id:'macauly',name:'Macauly',initials:'MP',role:'Operations · Sales · Marketing',isDirector:true},
    {id:'brad',name:'Brad',initials:'BP',role:'General · Site · Finance',isDirector:true},
    {id:'op1',name:'Paul Gordon',initials:'PG',role:'Fixer',isDirector:false},
    {id:'op2',name:'Gary Kimber',initials:'GK',role:'Plasterer',isDirector:false},
    {id:'op3',name:'Jensen Sunderland',initials:'JS',role:'Improver',isDirector:false}
  ]);
}
async function save(k,v){try{await window.storage.set(k,JSON.stringify(v));}catch(e){}}

const isTaskDone=(u,f,i)=>taskState[u]?.[f]?.[keys()[f]]?.[i]===true;
const getStats=(u,f)=>{const t=TASKS[u][f];return{done:t.filter((_,i)=>isTaskDone(u,f,i)).length,total:t.length};};

async function toggleTask(u,f,i){
  if(u!==currentUser)return;
  const k=keys()[f];
  if(!taskState[u])taskState[u]={};
  if(!taskState[u][f])taskState[u][f]={};
  if(!taskState[u][f][k])taskState[u][f][k]={};
  taskState[u][f][k][i]=!taskState[u][f][k][i];
  await save('pp_tasks',taskState);
  renderTasks();
}

function renderTasks(){
  const u=currentUser;
  const s=getStats(u,'daily');
  const pct=s.total>0?Math.round(s.done/s.total*100):0;
  let html=`<div class="view-header"><div class="view-title">${u==='macauly'?'Macauly':'Brad'}'s Tasks</div><div class="view-subtitle">${u==='macauly'?'Operations · Sales · Marketing':'General · Site · Finance'}</div></div><div class="progress-summary"><div class="progress-pct">${pct}%</div><div style="flex:1"><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div><div class="progress-text" style="margin-top:5px">${s.done} of ${s.total} daily tasks complete today</div></div></div>`;
  ['daily','weekly','monthly'].forEach(freq=>{
    const tasks=TASKS[u][freq],st=getStats(u,freq);
    html+=`<div class="task-section"><div class="section-header"><div class="section-label">${freq.charAt(0).toUpperCase()+freq.slice(1)}</div><div class="section-rule"></div><div class="section-count">${st.done}/${st.total}</div></div>`;
    tasks.forEach((text,idx)=>{
      const done=isTaskDone(u,freq,idx);
      html+=`<div class="task-card${done?' done':''}" onclick="toggleTask('${u}','${freq}',${idx})"><div class="task-check">${done?'✓':''}</div><div class="task-text">${text}</div></div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('view-tasks').innerHTML=html;
}

function renderNotes(){
  const other=currentUser==='macauly'?'brad':'macauly';
  const otherName=other==='macauly'?'Macauly':'Brad';
  const myName=currentUser==='macauly'?'Macauly':'Brad';
  const dk=todayKey();
  const myNote=notes[currentUser]?.[dk]||'';
  const otherNote=notes[other]?.[dk]||'';
  const today=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('view-notes').innerHTML=`<div class="view-header"><div class="view-title">Daily Notes</div><div class="view-subtitle">Shared between you and ${otherName} — visible to both</div></div><div class="notes-panel"><div class="notes-header"><div class="notes-header-title">📝 ${myName}'s Note</div><div class="notes-date">${today}</div></div><div class="notes-body"><textarea class="notes-textarea" id="my-note-input" placeholder="Add your notes for today...">${myNote}</textarea><div style="display:flex;align-items:center;margin-top:8px;"><button class="notes-save-btn" onclick="saveNote()">Save Note</button><span class="notes-saved-msg" id="notes-saved-msg">Saved ✓</span></div></div><div class="other-notes-box"><div class="other-notes-label">${otherName}'s Note Today</div>${otherNote?`<div class="other-notes-text">${otherNote.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`:`<div class="other-notes-empty">Nothing added yet today</div>`}</div></div>`;
}

async function saveNote(){
  const val=document.getElementById('my-note-input').value;
  const dk=todayKey();
  if(!notes[currentUser])notes[currentUser]={};
  notes[currentUser][dk]=val;
  await save('pp_notes',notes);
  const msg=document.getElementById('notes-saved-msg');
  msg.style.opacity='1';
  setTimeout(()=>msg.style.opacity='0',2000);
}

function renderCalendar(){
  const now=new Date();
  if(calYear===undefined){calYear=now.getFullYear();calMonth=now.getMonth();}
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const startOffset=(firstDay===0)?6:firstDay-1;
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let html=`<div class="view-header"><div class="view-title">Team Calendar</div><div class="view-subtitle">Who's in, on which job, and on what basis</div></div><div class="cal-nav"><button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button><div class="cal-month-label">${monthNames[calMonth]} ${calYear}</div><button class="cal-nav-btn" onclick="changeMonth(1)">›</button></div><div class="cal-grid">${dayNames.map(d=>`<div class="cal-day-header">${d}</div>`).join('')}`;
  const prevDays=new Date(calYear,calMonth,0).getDate();
  for(let i=startOffset-1;i>=0;i--){html+=`<div class="cal-day other-month"><div class="cal-day-num">${prevDays-i}</div></div>`;}
  for(let d=1;d<=daysInMonth;d++){
    const dk=fmtDate(calYear,calMonth,d);
    const entries=calEntries[dk]||[];
    html+=`<div class="cal-day${dk===todayKey()?' today':''}${dk===selectedCalDate?' selected':''}" onclick="selectCalDay('${dk}')"><div class="cal-day-num">${d}</div><div>${entries.slice(0,3).map(e=>`<span class="entry-pill${e.type==='price-work'?' price':''}">${e.person.split(' ')[0]}</span>`).join('')}${entries.length>3?`<span style="font-size:9px;color:var(--text-light)">+${entries.length-3}</span>`:''}</div></div>`;
  }
  const totalCells=Math.ceil((startOffset+daysInMonth)/7)*7;
  for(let i=1;i<=totalCells-startOffset-daysInMonth;i++){html+=`<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;}
  html+=`</div>`;
  if(selectedCalDate){
    const entries=calEntries[selectedCalDate]||[];
    const displayDate=new Date(selectedCalDate+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    const memberOptions=teamMembers.map(m=>`<option value="${m.name}">${m.name}</option>`).join('');
    html+=`<div class="day-panel"><div class="day-panel-header"><div class="day-panel-title">${displayDate}</div></div><div class="day-panel-body"><div class="add-entry-form"><div class="form-group"><label>Person</label><select id="cal-person">${memberOptions}</select></div><div class="form-group"><label>Job / Location</label><input type="text" id="cal-job" placeholder="e.g. AWE Site"/></div><div class="form-group"><label>Basis</label><select id="cal-type"><option value="day-rate">Day Rate</option><option value="price-work">Price Work</option></select></div><button class="add-entry-btn" onclick="addCalEntry()">+ Add</button></div><div class="entries-list">${entries.length===0?`<div class="no-entries">No entries for this day yet</div>`:entries.map((e,i)=>`<div class="entry-row"><div class="entry-person">${e.person}</div><div class="entry-job">${e.job}</div><div class="entry-type ${e.type}">${e.type==='day-rate'?'Day Rate':'Price Work'}</div><button class="entry-remove" onclick="removeCalEntry(${i})">×</button></div>`).join('')}</div></div></div>`;
  }
  document.getElementById('view-calendar').innerHTML=html;
}

function changeMonth(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function selectCalDay(dk){selectedCalDate=dk;renderCalendar();}
async function addCalEntry(){
  const person=document.getElementById('cal-person').value;
  const job=document.getElementById('cal-job').value.trim();
  const type=document.getElementById('cal-type').value;
  if(!job){document.getElementById('cal-job').focus();return;}
  if(!calEntries[selectedCalDate])calEntries[selectedCalDate]=[];
  calEntries[selectedCalDate].push({person,job,type});
  await save('pp_cal',calEntries);
  renderCalendar();
}
async function removeCalEntry(idx){calEntries[selectedCalDate].splice(idx,1);await save('pp_cal',calEntries);renderCalendar();}

function getMissed(u,f){
  const tasks=TASKS[u][f];let prevKey;
  if(f==='daily'){const d=new Date();d.setDate(d.getDate()-1);prevKey=d.toISOString().split('T')[0];}
  else if(f==='weekly'){const d=new Date();d.setDate(d.getDate()-7);const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);prevKey=new Date(d.setDate(diff)).toISOString().split('T')[0];}
  else{const d=new Date();d.setMonth(d.getMonth()-1);prevKey=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
  return tasks.map((t,i)=>({text:t,idx:i})).filter((_,i)=>!(taskState[u]?.[f]?.[prevKey]?.[i]===true));
}

function renderTeam(){
  let html=`<div class="view-header"><div class="view-title">Team Overview</div><div class="view-subtitle">How everyone is tracking across all roles</div></div>`;
  ['macauly','brad'].forEach(u=>{
    const uName=u==='macauly'?'Macauly':'Brad',uInit=u==='macauly'?'MP':'BP',uRoles=u==='macauly'?'Operations · Sales · Marketing':'General · Site · Finance';
    const daily=getStats(u,'daily'),weekly=getStats(u,'weekly'),monthly=getStats(u,'monthly');
    const missed=getMissed(u,'daily');
    html+=`<div class="team-card"><div class="team-card-header"><div class="team-avatar">${uInit}</div><div><div class="team-name">${uName}</div><div class="team-roles">${uRoles}</div></div></div><div class="team-progress-row"><div class="team-stat"><div class="team-stat-val">${daily.done}/${daily.total}</div><div class="team-stat-label">Today</div></div><div class="team-stat"><div class="team-stat-val">${weekly.done}/${weekly.total}</div><div class="team-stat-label">This Week</div></div><div class="team-stat"><div class="team-stat-val">${monthly.done}/${monthly.total}</div><div class="team-stat-label">This Month</div></div></div>${missed.length>0?`<div class="missed-tasks-list"><div class="section-header" style="margin-top:14px;margin-bottom:7px"><div class="section-label" style="color:var(--red)">Missed Yesterday</div><div class="section-rule"></div></div>${missed.slice(0,5).map(m=>`<div class="missed-item"><div class="missed-dot"></div><div>${m.text}</div><div class="missed-freq">daily</div></div>`).join('')}${missed.length>5?`<div style="font-size:12px;color:var(--text-light);padding-top:6px;">+${missed.length-5} more</div>`:''}</div>`:''}</div>`;
  });
  document.getElementById('view-team').innerHTML=html;
}

function renderNudge(){
  const other=currentUser==='macauly'?'brad':'macauly';
  const otherName=other==='macauly'?'Macauly':'Brad',otherInit=other==='macauly'?'MP':'BP';
  const stats=getStats(other,'daily');
  const alreadyNudged=nudges.some(n=>n.from===currentUser&&n.to===other&&n.date===todayKey());
  const myNudges=nudges.filter(n=>n.to===currentUser);
  let html=`<div class="view-header"><div class="view-title">Send a Nudge</div><div class="view-subtitle">Give ${otherName} a heads up if something needs doing</div></div><div class="nudge-section"><div class="nudge-title">Send to</div><div class="nudge-user-row"><div class="nudge-avatar">${otherInit}</div><div class="nudge-info"><div class="nudge-name">${otherName}</div><div class="nudge-stats">${stats.done}/${stats.total} daily tasks done today</div></div><button class="nudge-btn" onclick="sendNudge('${other}')" ${alreadyNudged?'disabled':''}>${alreadyNudged?'Nudged ✓':'Nudge 👋'}</button></div></div>`;
  if(myNudges.length>0){html+=`<div class="nudge-section"><div class="nudge-title">Your Inbox</div>${myNudges.slice().reverse().map(n=>`<div class="nudge-user-row"><div class="nudge-avatar">${n.from==='macauly'?'MP':'BP'}</div><div class="nudge-info"><div class="nudge-name">${n.from==='macauly'?'Macauly':'Brad'} nudged you</div><div class="nudge-stats">${n.message} · ${n.date}</div></div></div>`).join('')}</div>`;}
  document.getElementById('view-nudge').innerHTML=html;
}

async function sendNudge(to){
  const st=getStats(to,'daily');
  let msg=`${currentUser==='macauly'?'Macauly':'Brad'} is checking in — `;
  msg+=st.done===st.total?`all daily tasks ticked off, nice one!`:`${st.total-st.done} daily task${st.total-st.done>1?'s':''} still to go today.`;
  nudges.push({from:currentUser,to,date:todayKey(),message:msg});
  await save('pp_nudges',nudges);
  renderNudge();
  showNotif(`Nudge sent to ${to==='macauly'?'Macauly':'Brad'}`,msg);
}

function renderManage(){
  let html=`<div class="view-header"><div class="view-title">Manage Team</div><div class="view-subtitle">Add or remove operatives as the team changes</div></div><div class="manage-section"><div class="manage-header"><div class="manage-header-title">Current Team</div></div><div class="manage-body">`;
  teamMembers.forEach((m,i)=>{
    const isEditing=editingMemberIdx===i;
    html+=`<div class="team-member-row"><div class="member-avatar-sm">${m.initials}</div><div class="member-info" style="flex:1">${isEditing?`<input type="text" id="edit-name-${i}" value="${m.name}" style="border:1px solid var(--gold);background:var(--beige-light);font-family:'Barlow',sans-serif;font-size:13px;padding:4px 8px;width:100%;margin-bottom:4px;outline:none;"/><input type="text" id="edit-role-${i}" value="${m.role}" style="border:1px solid var(--beige-mid);background:var(--beige-light);font-family:'Barlow',sans-serif;font-size:12px;padding:3px 8px;width:100%;outline:none;"/>`:`<div class="member-name">${m.name}</div><div class="member-role">${m.role}</div>`}</div><span class="member-type-badge ${m.isDirector?'director':'operative'}" style="flex-shrink:0">${m.isDirector?'Director':'Operative'}</span>${!m.isDirector?(isEditing?`<button class="add-entry-btn" style="padding:5px 12px;font-size:11px;height:auto;margin-left:6px;" onclick="saveMemberEdit(${i})">Save</button><button class="remove-member-btn" style="margin-left:4px;" onclick="cancelMemberEdit()">Cancel</button>`:`<button class="remove-member-btn" style="margin-right:4px;" onclick="startMemberEdit(${i})">Rename</button><button class="remove-member-btn" onclick="removeMember(${i})">Remove</button>`):''}</div>`;
  });
  html+=`<div class="add-member-form"><div class="form-group"><label>Name</label><input type="text" id="new-member-name" placeholder="e.g. John Smith"/></div><div class="form-group"><label>Role</label><input type="text" id="new-member-role" placeholder="e.g. Dryliner"/></div><button class="add-entry-btn" onclick="addMember()" style="align-self:flex-end">+ Add</button></div></div></div>`;
  document.getElementById('view-manage').innerHTML=html;
}

async function addMember(){
  const name=document.getElementById('new-member-name').value.trim();
  const role=document.getElementById('new-member-role').value.trim();
  if(!name){document.getElementById('new-member-name').focus();return;}
  const initials=name.split(' ').map(p=>p[0].toUpperCase()).join('').slice(0,2);
  teamMembers.push({id:'op_'+Date.now(),name,initials,role:role||'Operative',isDirector:false});
  await save('pp_team',teamMembers);
  renderManage();
}
function startMemberEdit(idx){editingMemberIdx=idx;renderManage();}
function cancelMemberEdit(){editingMemberIdx=-1;renderManage();}
async function saveMemberEdit(idx){
  const name=document.getElementById(`edit-name-${idx}`).value.trim();
  const role=document.getElementById(`edit-role-${idx}`).value.trim();
  if(!name)return;
  teamMembers[idx]={...teamMembers[idx],name,role:role||'Operative',initials:name.split(' ').map(p=>p[0].toUpperCase()).join('').slice(0,2)};
  editingMemberIdx=-1;
  await save('pp_team',teamMembers);
  renderManage();
}
async function removeMember(idx){teamMembers.splice(idx,1);await save('pp_team',teamMembers);renderManage();}

function showNotif(from,msg){
  document.getElementById('notif-from').textContent=from;
  document.getElementById('notif-msg').textContent=msg;
  const el=document.getElementById('notification');
  el.style.display='block';
  setTimeout(()=>el.style.display='none',5000);
}
function checkPendingNudges(){
  const mine=nudges.filter(n=>n.to===currentUser&&n.date===todayKey());
  if(mine.length>0){const latest=mine[mine.length-1];setTimeout(()=>showNotif(`👋 Nudge from ${latest.from==='macauly'?'Macauly':'Brad'}`,latest.message),800);}
}

function getPayWeekKey(offset){
  const d=new Date();d.setDate(d.getDate()+offset*7);
  const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);
  return new Date(d.setDate(diff)).toISOString().split('T')[0];
}
function getPayWeekLabel(offset){
  const wk=getPayWeekKey(offset);
  const mon=new Date(wk+'T12:00:00'),fri=new Date(mon);fri.setDate(fri.getDate()+4);
  const fmt=d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  return offset===0?`This Week (${fmt(mon)} – ${fmt(fri)})`:`${fmt(mon)} – ${fmt(fri)}`;
}

function renderPayLog(){
  const wk=getPayWeekKey(payLogWeekOffset);
  const entries=payLog[wk]?JSON.parse(JSON.stringify(payLog[wk])):[];
  const existingIds=entries.map(e=>e.personId);
  teamMembers.forEach(m=>{if(!existingIds.includes(m.id))entries.push({personId:m.id,name:m.name,role:m.role,days:'',rate:'',basis:'day-rate',note:'',amount:0});});
  const total=entries.reduce((sum,e)=>sum+(parseFloat(e.amount)||0),0);
  const pastWeeks=Object.keys(payLog).sort().reverse().filter(k=>k!==wk);
  let html=`<div class="view-header"><div class="view-title">Pay Log</div><div class="view-subtitle">Weekly record of what everyone is owed</div></div><div class="paylog-week-selector"><button class="cal-nav-btn" onclick="changePayWeek(-1)">‹</button><div class="paylog-week-label">${getPayWeekLabel(payLogWeekOffset)}</div><button class="cal-nav-btn" onclick="changePayWeek(1)">›</button></div><table class="paylog-table"><thead><tr><th>Name</th><th>Role</th><th>Days</th><th>Rate £</th><th>Basis</th><th>Note</th><th>Owed</th></tr></thead><tbody>${entries.map((e,i)=>`<tr><td><strong>${e.name}</strong></td><td style="color:var(--text-mid);font-size:12px;">${e.role||''}</td><td><input class="paylog-input" style="width:65px;" type="number" min="0" step="0.5" value="${e.days}" placeholder="0" oninput="updatePayEntry('${wk}',${i},'days',this.value)"/></td><td><input class="paylog-input" style="width:75px;" type="number" min="0" step="1" value="${e.rate}" placeholder="0" oninput="updatePayEntry('${wk}',${i},'rate',this.value)"/></td><td><select class="paylog-select" style="width:95px;" onchange="updatePayEntry('${wk}',${i},'basis',this.value)"><option value="day-rate" ${e.basis==='day-rate'?'selected':''}>Day Rate</option><option value="price-work" ${e.basis==='price-work'?'selected':''}>Price Work</option></select></td><td><input class="paylog-input" type="text" value="${e.note||''}" placeholder="Note" oninput="updatePayEntry('${wk}',${i},'note',this.value)"/></td><td><span class="paylog-amount">£${(parseFloat(e.amount)||0).toFixed(2)}</span></td></tr>`).join('')}</tbody><tfoot><tr class="paylog-total-row"><td colspan="6"><strong>Total This Week</strong></td><td><span class="paylog-amount">£${total.toFixed(2)}</span></td></tr></tfoot></table><div class="paylog-save-row"><button class="notes-save-btn" onclick="savePayLog('${wk}')">Save Pay Log</button><span class="notes-saved-msg" id="pay-saved-msg">Saved ✓</span></div>`;
  if(pastWeeks.length>0){
    html+=`<div class="paylog-history" style="margin-top:28px;"><div class="paylog-history-header"><div class="paylog-history-title">Previous Weeks</div></div><div class="paylog-history-body">`;
    pastWeeks.forEach(wkKey=>{
      const wkEntries=payLog[wkKey],wkTotal=wkEntries.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
      const mon=new Date(wkKey+'T12:00:00'),fri=new Date(mon);fri.setDate(fri.getDate()+4);
      const fmt=d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
      html+=`<div class="paylog-hist-week"><div class="paylog-hist-week-label">w/c ${fmt(mon)} — Total: £${wkTotal.toFixed(2)}</div>${wkEntries.filter(e=>(parseFloat(e.amount)||0)>0).map(e=>`<div class="paylog-hist-row"><div class="paylog-hist-name">${e.name}</div><div class="paylog-hist-detail">${e.days?`${e.days} ${e.basis==='day-rate'?'days':'units'} @ £${e.rate}`:''}<span class="basis-badge ${e.basis}" style="margin-left:6px;">${e.basis==='day-rate'?'Day Rate':'Price Work'}</span>${e.note?`<span style="color:var(--text-light);margin-left:8px;">${e.note}</span>`:''}</div><div class="paylog-hist-amount">£${(parseFloat(e.amount)||0).toFixed(2)}</div></div>`).join('')}</div>`;
    });
    html+=`</div></div>`;
  }
  document.getElementById('view-paylog').innerHTML=html;
}

function changePayWeek(dir){payLogWeekOffset+=dir;renderPayLog();}

function updatePayEntry(wk,idx,field,val){
  if(!payLog[wk])payLog[wk]=teamMembers.map(m=>({personId:m.id,name:m.name,role:m.role,days:'',rate:'',basis:'day-rate',note:'',amount:0}));
  payLog[wk][idx][field]=val;
  const e=payLog[wk][idx];
  e.amount=e.basis==='day-rate'&&e.days&&e.rate?parseFloat(e.days)*parseFloat(e.rate):e.basis==='price-work'&&e.rate?parseFloat(e.rate):0;
  const rows=document.querySelectorAll('.paylog-table tbody tr');
  if(rows[idx]){const a=rows[idx].querySelector('.paylog-amount');if(a)a.textContent=`£${(parseFloat(e.amount)||0).toFixed(2)}`;}
  const tot=payLog[wk].reduce((s,en)=>s+(parseFloat(en.amount)||0),0);
  const totEl=document.querySelector('.paylog-total-row .paylog-amount');
  if(totEl)totEl.textContent=`£${tot.toFixed(2)}`;
}

async function savePayLog(wk){
  await save('pp_paylog',payLog);
  const msg=document.getElementById('pay-saved-msg');
  if(msg){msg.style.opacity='1';setTimeout(()=>msg.style.opacity='0',2000);}
}

const views=['tasks','notes','calendar','team','nudge','manage','paylog'];
function showView(view,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(tab)tab.classList.add('active');
  views.forEach(v=>document.getElementById('view-'+v).style.display=v===view?'block':'none');
  if(view==='tasks')renderTasks();
  if(view==='notes')renderNotes();
  if(view==='calendar')renderCalendar();
  if(view==='team')renderTeam();
  if(view==='nudge')renderNudge();
  if(view==='manage')renderManage();
  if(view==='paylog')renderPayLog();
}

async function login(user){
  await loadAll();
  currentUser=user;
  document.getElementById('header-avatar').textContent=user==='macauly'?'MP':'BP';
  document.getElementById('header-name').textContent=user==='macauly'?'Macauly':'Brad';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  showView('tasks',null);
  document.querySelectorAll('.tab')[0].classList.add('active');
  checkPendingNudges();
}

function logout(){
  currentUser=null;
  calYear=undefined;calMonth=undefined;selectedCalDate=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}
</script>
</body>
</html>
