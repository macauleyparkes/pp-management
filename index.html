<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perry & Parkes — Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #1a1a18; --black2: #222220; --beige: #e8dcc8; --beige-light: #f5f0e8;
    --beige-mid: #d4c4a8; --gold: #b8965a; --white: #fdfaf5; --red: #c0392b;
    --green: #2e7d52; --green-light: #e8f5ee; --blue: #2471a3; --blue-light: #eaf4fb;
    --text: #2a2a26; --text-mid: #666660; --text-light: #999990;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); font-family: 'Barlow', sans-serif; min-height: 100vh; color: var(--text); }
 
  /* LOGIN */
  #login-screen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; background:var(--black); background-image:radial-gradient(ellipse at 20% 50%, rgba(184,150,90,0.06) 0%, transparent 60%); }
  .login-logo { text-align:center; margin-bottom:48px; }
  .login-logo .company-name { font-family:'Playfair Display',serif; font-weight:900; font-size:36px; color:var(--beige); letter-spacing:3px; }
  .login-logo .company-sub { font-size:11px; color:var(--text-light); letter-spacing:5px; text-transform:uppercase; margin-top:6px; }
  .login-logo .gold-rule { width:60px; height:2px; background:var(--gold); margin:14px auto 0; }
  .login-title { font-size:13px; color:var(--text-light); letter-spacing:2px; text-transform:uppercase; margin-bottom:36px; }
  .profile-cards { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
  .profile-card { background:var(--black2); border:1px solid rgba(184,150,90,0.2); padding:32px 40px; cursor:pointer; transition:all 0.2s; text-align:center; min-width:170px; position:relative; }
  .profile-card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:var(--gold); transform:scaleX(0); transition:transform 0.2s; }
  .profile-card:hover { border-color:var(--gold); transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,0.4); }
  .profile-card:hover::before { transform:scaleX(1); }
  .profile-avatar { width:60px; height:60px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:22px; color:var(--black); margin:0 auto 14px; }
  .profile-card .name { font-family:'Playfair Display',serif; font-size:19px; color:var(--beige); font-weight:700; }
  .profile-card .role-label { font-size:11px; color:var(--text-light); letter-spacing:1px; text-transform:uppercase; margin-top:5px; }
 
  /* APP */
  #app { display:none; min-height:100vh; background:var(--beige-light); }
  .app-header { background:var(--black); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:60px; border-bottom:2px solid var(--gold); position:sticky; top:0; z-index:100; }
  .header-logo { font-family:'Playfair Display',serif; font-weight:900; font-size:17px; color:var(--beige); letter-spacing:2px; }
  .header-logo span { color:var(--gold); }
  .header-right { display:flex; align-items:center; gap:14px; }
  .user-avatar-sm { width:30px; height:30px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:12px; color:var(--black); }
  .user-name-sm { font-size:13px; color:var(--beige); font-weight:500; }
  .switch-btn { background:transparent; border:1px solid rgba(184,150,90,0.4); color:var(--text-light); font-family:'Barlow',sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase; padding:5px 12px; cursor:pointer; transition:all 0.15s; }
  .switch-btn:hover { border-color:var(--gold); color:var(--gold); }
  .sync-indicator { font-size:10px; color:var(--text-light); letter-spacing:1px; }
  .sync-indicator.live { color:#2ecc71; }
 
  /* TABS */
  .tab-bar { background:var(--black2); display:flex; border-bottom:1px solid rgba(184,150,90,0.15); padding:0 24px; overflow-x:auto; }
  .tab { padding:13px 16px; font-size:12px; font-weight:500; color:var(--text-light); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:all 0.15s; }
  .tab:hover { color:var(--beige); }
  .tab.active { color:var(--gold); border-bottom-color:var(--gold); }
 
  /* BODY */
  .app-body { max-width:920px; margin:0 auto; padding:26px 20px 70px; }
  .view-header { margin-bottom:24px; }
  .view-title { font-family:'Playfair Display',serif; font-size:26px; color:var(--black); font-weight:700; }
  .view-subtitle { font-size:13px; color:var(--text-mid); margin-top:3px; }
 
  /* PROGRESS */
  .progress-summary { background:var(--white); border:1px solid var(--beige-mid); padding:18px 22px; margin-bottom:24px; display:flex; align-items:center; gap:18px; }
  .progress-bar-wrap { flex:1; height:5px; background:var(--beige-mid); border-radius:3px; overflow:hidden; }
  .progress-bar-fill { height:100%; background:var(--gold); border-radius:3px; transition:width 0.4s; }
  .progress-text { font-size:12px; color:var(--text-mid); }
  .progress-pct { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:var(--gold); min-width:48px; text-align:right; }
 
  /* TASKS */
  .task-section { margin-bottom:28px; }
  .section-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .section-label { font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--text-light); }
  .section-rule { flex:1; height:1px; background:var(--beige-mid); }
  .section-count { font-size:11px; color:var(--text-light); }
  .task-card { background:var(--white); border:1px solid var(--beige-mid); border-left:3px solid var(--beige-mid); padding:13px 16px; margin-bottom:7px; display:flex; align-items:flex-start; gap:12px; transition:all 0.15s; cursor:pointer; user-select:none; }
  .task-card:hover { border-color:var(--gold); }
  .task-card.done { background:var(--green-light); border-left-color:var(--green); opacity:0.85; }
  .task-check { width:20px; height:20px; border:2px solid var(--beige-mid); border-radius:3px; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; background:white; font-size:12px; }
  .task-card.done .task-check { background:var(--green); border-color:var(--green); color:white; }
  .task-text { flex:1; font-size:14px; line-height:1.5; color:var(--text); }
  .task-card.done .task-text { text-decoration:line-through; color:var(--text-mid); }
 
  /* NOTES */
  .notes-panel { background:var(--white); border:1px solid var(--beige-mid); margin-bottom:28px; }
  .notes-header { background:var(--black); padding:12px 18px; display:flex; align-items:center; justify-content:space-between; }
  .notes-header-title { font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--beige); }
  .notes-date { font-size:11px; color:var(--text-light); }
  .notes-body { padding:16px; }
  .notes-textarea { width:100%; min-height:90px; border:1px solid var(--beige-mid); background:var(--beige-light); font-family:'Barlow',sans-serif; font-size:14px; color:var(--text); padding:10px 12px; resize:vertical; outline:none; line-height:1.5; }
  .notes-textarea:focus { border-color:var(--gold); }
  .notes-save-btn { margin-top:8px; background:var(--black); color:var(--beige); border:none; font-family:'Barlow',sans-serif; font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; padding:8px 18px; cursor:pointer; transition:all 0.15s; }
  .notes-save-btn:hover { background:var(--gold); color:var(--black); }
  .saved-msg { font-size:11px; color:var(--green); margin-left:10px; opacity:0; transition:opacity 0.3s; }
  .other-notes-box { border-top:1px solid var(--beige-mid); padding:14px 16px; background:var(--beige-light); }
  .other-notes-label { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-light); margin-bottom:6px; }
  .other-notes-text { font-size:13px; color:var(--text-mid); line-height:1.5; white-space:pre-wrap; }
  .other-notes-empty { font-size:13px; color:var(--text-light); font-style:italic; }
  .notes-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; background:var(--white); border:1px solid var(--beige-mid); padding:10px 14px; }
  .notes-nav-btn { background:var(--black); color:var(--beige); border:none; width:30px; height:30px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; font-family:'Barlow',sans-serif; }
  .notes-nav-btn:hover { background:var(--gold); color:var(--black); }
  .notes-nav-date { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:var(--black); text-align:center; flex:1; }
  .notes-nav-today { font-size:11px; color:var(--gold); font-weight:600; letter-spacing:1px; text-transform:uppercase; cursor:pointer; background:none; border:none; font-family:'Barlow',sans-serif; }
 
  /* CALENDAR */
  .cal-nav { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
  .cal-nav-btn { background:var(--black); color:var(--beige); border:none; width:32px; height:32px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
  .cal-nav-btn:hover { background:var(--gold); color:var(--black); }
  .cal-month-label { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:var(--black); }
  .cal-legend { display:flex; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
  .cal-legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-mid); }
  .cal-legend-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--beige-mid); border:1px solid var(--beige-mid); margin-bottom:24px; }
  .cal-day-header { background:var(--black); color:var(--beige); font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; text-align:center; padding:8px 2px; }
  .cal-day { background:var(--white); min-height:72px; padding:5px; cursor:pointer; transition:background 0.12s; overflow:hidden; }
  .cal-day:hover { background:var(--beige-light); }
  .cal-day.other-month { background:#f0ece4; }
  .cal-day.today { outline:2px solid var(--gold); outline-offset:-2px; }
  .cal-day.selected { background:var(--beige); }
  .cal-day-num { font-size:11px; font-weight:600; color:var(--text-mid); margin-bottom:3px; }
  .cal-day.today .cal-day-num { color:var(--gold); font-weight:700; }
  .entry-pill { font-size:9px; font-weight:600; padding:1px 4px; border-radius:2px; margin-bottom:2px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:white; }
 
  /* DAY PANEL */
  .day-panel { background:var(--white); border:1px solid var(--beige-mid); margin-bottom:20px; }
  .day-panel-header { background:var(--black); padding:14px 18px; }
  .day-panel-title { font-family:'Playfair Display',serif; font-size:16px; color:var(--beige); font-weight:700; }
  .day-panel-body { padding:18px; }
  .add-entry-form { display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:10px; align-items:end; margin-bottom:18px; }
  .form-group label { display:block; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text-light); margin-bottom:5px; }
  .form-group select, .form-group input { width:100%; border:1px solid var(--beige-mid); background:var(--beige-light); font-family:'Barlow',sans-serif; font-size:13px; color:var(--text); padding:8px 10px; outline:none; }
  .form-group select:focus, .form-group input:focus { border-color:var(--gold); }
  .add-entry-btn { background:var(--black); color:var(--beige); border:none; font-family:'Barlow',sans-serif; font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:9px 16px; cursor:pointer; transition:all 0.15s; height:36px; white-space:nowrap; }
  .add-entry-btn:hover { background:var(--gold); color:var(--black); }
  .entries-list { display:flex; flex-direction:column; gap:8px; }
  .entry-row { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--beige-light); border:1px solid var(--beige-mid); border-left:4px solid #999; }
  .entry-person { font-weight:600; font-size:13px; color:var(--black); min-width:90px; }
  .entry-job { flex:1; font-size:13px; color:var(--text); }
  .entry-remove { background:none; border:none; color:var(--text-light); cursor:pointer; font-size:16px; padding:0 4px; margin-left:auto; }
  .entry-remove:hover { color:var(--red); }
  .no-entries { font-size:13px; color:var(--text-light); font-style:italic; text-align:center; padding:16px 0; }
 
  /* TEAM */
  .team-card { background:var(--white); border:1px solid var(--beige-mid); padding:22px; margin-bottom:18px; }
  .team-card-header { display:flex; align-items:center; gap:14px; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--beige-mid); }
  .team-avatar { width:44px; height:44px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:18px; color:var(--black); }
  .team-name { font-family:'Playfair Display',serif; font-size:19px; font-weight:700; color:var(--black); }
  .team-roles { font-size:12px; color:var(--text-mid); margin-top:2px; }
  .team-progress-row { display:flex; gap:10px; flex-wrap:wrap; }
  .team-stat { flex:1; min-width:90px; background:var(--beige-light); border:1px solid var(--beige-mid); padding:10px 14px; text-align:center; }
  .team-stat-val { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; color:var(--gold); }
  .team-stat-label { font-size:10px; color:var(--text-mid); letter-spacing:1px; text-transform:uppercase; margin-top:2px; }
  .missed-tasks-list { margin-top:14px; }
  .missed-item { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--beige-mid); font-size:13px; }
  .missed-item:last-child { border-bottom:none; }
  .missed-dot { width:7px; height:7px; background:var(--red); border-radius:50%; flex-shrink:0; }
  .missed-freq { font-size:10px; color:var(--text-light); letter-spacing:1px; text-transform:uppercase; margin-left:auto; }
 
  /* STREAKS & LEADERBOARD */
  .leaderboard-card { background:var(--black); border:2px solid var(--gold); padding:22px; margin-bottom:22px; }
  .leaderboard-title { font-family:'Playfair Display',serif; font-size:20px; color:var(--gold); font-weight:700; margin-bottom:18px; text-align:center; letter-spacing:1px; }
  .leaderboard-row { display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid rgba(184,150,90,0.2); }
  .leaderboard-row:last-child { border-bottom:none; }
  .leaderboard-pos { font-family:'Playfair Display',serif; font-size:28px; font-weight:900; color:var(--gold); min-width:36px; }
  .leaderboard-pos.second { color:var(--beige-mid); }
  .leaderboard-avatar { width:44px; height:44px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:16px; color:var(--black); flex-shrink:0; }
  .leaderboard-avatar.second { background:var(--beige-mid); }
  .leaderboard-info { flex:1; }
  .leaderboard-name { font-family:'Playfair Display',serif; font-size:17px; color:var(--beige); font-weight:700; }
  .leaderboard-streaks { display:flex; gap:8px; margin-top:5px; flex-wrap:wrap; }
  .streak-badge { display:flex; align-items:center; gap:4px; background:rgba(184,150,90,0.15); border:1px solid rgba(184,150,90,0.3); padding:3px 9px; border-radius:2px; }
  .streak-badge.active { background:rgba(184,150,90,0.25); border-color:var(--gold); }
  .streak-val { font-family:'Playfair Display',serif; font-size:14px; font-weight:700; color:var(--gold); }
  .streak-label { font-size:10px; color:var(--text-light); letter-spacing:1px; text-transform:uppercase; }
  .streak-fire { font-size:13px; }
  .leaderboard-score { text-align:right; }
  .leaderboard-total { font-family:'Playfair Display',serif; font-size:26px; font-weight:900; color:var(--gold); line-height:1; }
  .leaderboard-total.second { color:var(--beige-mid); }
  .leaderboard-pts { font-size:10px; color:var(--text-light); letter-spacing:1px; text-transform:uppercase; }
 
  /* NUDGE */
  .nudge-section { background:var(--white); border:1px solid var(--beige-mid); padding:22px; margin-bottom:22px; }
  .nudge-title { font-family:'Playfair Display',serif; font-size:17px; font-weight:700; color:var(--black); margin-bottom:14px; }
  .nudge-row { display:flex; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--beige-mid); }
  .nudge-row:last-child { border-bottom:none; }
  .nudge-avatar { width:38px; height:38px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:15px; color:var(--black); flex-shrink:0; }
  .nudge-info { flex:1; }
  .nudge-name { font-weight:600; font-size:13px; color:var(--black); }
  .nudge-stats { font-size:12px; color:var(--text-mid); margin-top:2px; }
  .nudge-btn { background:var(--black); color:var(--beige); border:none; font-family:'Barlow',sans-serif; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:7px 14px; cursor:pointer; transition:all 0.15s; }
  .nudge-btn:hover { background:var(--gold); color:var(--black); }
  .nudge-btn:disabled { opacity:0.4; cursor:default; }
 
  /* MANAGE */
  .manage-section { background:var(--white); border:1px solid var(--beige-mid); margin-bottom:20px; }
  .manage-header { background:var(--black); padding:12px 18px; }
  .manage-header-title { font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--beige); }
  .manage-body { padding:18px; }
  .member-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--beige-mid); }
  .member-row:last-child { border-bottom:none; }
  .member-av { width:34px; height:34px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:13px; color:var(--black); flex-shrink:0; }
  .member-info { flex:1; }
  .member-name { font-size:14px; font-weight:600; color:var(--black); }
  .member-role { font-size:11px; color:var(--text-mid); }
  .type-badge { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:2px 8px; border-radius:2px; flex-shrink:0; }
  .type-badge.director { background:var(--black); color:var(--beige); }
  .type-badge.operative { background:var(--beige-mid); color:var(--text); }
  .rm-btn { background:none; border:1px solid rgba(192,57,43,0.3); color:var(--red); font-family:'Barlow',sans-serif; font-size:11px; padding:4px 10px; cursor:pointer; transition:all 0.15s; }
  .rm-btn:hover { background:var(--red); color:white; border-color:var(--red); }
  .add-member-form { display:grid; grid-template-columns:1fr 1fr auto; gap:10px; align-items:end; margin-top:16px; padding-top:16px; border-top:1px solid var(--beige-mid); }
 
  /* PAY LOG */
  .paylog-week-selector { display:flex; align-items:center; gap:14px; margin-bottom:22px; }
  .paylog-week-label { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:var(--black); }
  .paylog-table { width:100%; border-collapse:collapse; background:var(--white); border:1px solid var(--beige-mid); margin-bottom:20px; }
  .paylog-table th { background:var(--black); color:var(--beige); font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:10px 10px; text-align:left; }
  .paylog-table td { padding:9px 10px; border-bottom:1px solid var(--beige-mid); font-size:13px; color:var(--text); vertical-align:middle; }
  .paylog-table tr:last-child td { border-bottom:none; }
  .paylog-table tr:hover td { background:var(--beige-light); }
  .paylog-input { border:1px solid var(--beige-mid); background:var(--beige-light); font-family:'Barlow',sans-serif; font-size:13px; color:var(--text); padding:5px 7px; width:100%; outline:none; }
  .paylog-input:focus { border-color:var(--gold); }
  .paylog-select { border:1px solid var(--beige-mid); background:var(--beige-light); font-family:'Barlow',sans-serif; font-size:12px; color:var(--text); padding:5px 7px; width:100%; outline:none; }
  .paylog-total-row td { background:var(--beige); font-weight:700; border-top:2px solid var(--gold); }
  .paylog-amount { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:var(--gold); }
  .paylog-total-row .paylog-amount { font-size:17px; color:var(--black); }
  .cal-days-info { font-size:11px; color:var(--blue); font-style:italic; }
  .paylog-save-row { display:flex; align-items:center; gap:12px; margin-top:4px; margin-bottom:28px; }
  .paylog-history { background:var(--white); border:1px solid var(--beige-mid); }
  .paylog-history-header { background:var(--black2); padding:12px 16px; }
  .paylog-history-title { font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--beige); }
  .paylog-hist-week { border-bottom:1px solid var(--beige-mid); }
  .paylog-hist-week:last-child { border-bottom:none; }

let currentUser = null;

let calYear, calMonth, selectedCalDate=null, editingMemberIdx=-1, payLogWeekOffset=0;

const todayKey = () => new Date().toISOString().split('T')[0];
const weekKey = () => { const d=new Date(),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1); return new Date(new Date().setDate(diff)).toISOString().split('T')[0]; };
const monthKey = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };
const fmtDate = (y,m,d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const keys = () => ({daily:todayKey(), weekly:weekKey(), monthly:monthKey()});
const fmtDisplayDate = d => d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
const dateToKey = d => d.toISOString().split('T')[0];
 
// ─── FIREBASE HELPERS ────────────────────────────────────────────────────────
function dbDoc(path) {
  const parts = path.split('/');
  return db.collection(parts[0]).doc(parts[1]);
}
async function fbSet(path, data) {
  try { await dbDoc(path).set(data); } catch(e) { console.error('Save error:', e); }
}
async function fbGet(path, def) {
  try { const s = await dbDoc(path).get(); return s.exists ? s.data() : def; } catch(e) { return def; }
}
function fbListen(path, callback) {
  const unsub = dbDoc(path).onSnapshot(snap => { if(snap.exists) callback(snap.data()); });
  unsubscribers.push(unsub);
  return unsub;
}
 
// ─── LOAD & SYNC ─────────────────────────────────────────────────────────────

  ]})).members;
 
  unsubscribers.forEach(u=>u());
  unsubscribers=[];
  fbListen('app/tasks',    d => { taskState=d;    if(isVisible('tasks'))renderTasks(); if(isVisible('streaks'))renderStreaks(); if(isVisible('team'))renderTeam(); });
  fbListen('app/notes',    d => { notes=d;        if(isVisible('notes'))renderNotes(); });

}

// ─── STREAKS ─────────────────────────────────────────────────────────────────
function isAllDone(u, freq) {
  const tasks = TASKS[u][freq];
  const k = keys()[freq];
  return tasks.every((_,i) => taskState[u]?.[freq]?.[k]?.[i] === true);
}
 
async function checkAndUpdateStreaks() {
  const dk = todayKey(), wk = weekKey(), mk = monthKey();
  if(!streaks[currentUser]) streaks[currentUser] = {
    daily:{streak:0,lastKey:'',longestDaily:0},
    weekly:{streak:0,lastKey:'',longestWeekly:0},
    monthly:{streak:0,lastKey:'',longestMonthly:0},
    totalPoints:0
  };
  const s = streaks[currentUser];
  let changed = false;
 
  // Daily streak
  if(isAllDone(currentUser,'daily') && s.daily.lastKey !== dk) {
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yk = yesterday.toISOString().split('T')[0];
    if(s.daily.lastKey === yk) s.daily.streak++;
    else s.daily.streak = 1;
    s.daily.lastKey = dk;
    if(s.daily.streak > (s.daily.longestDaily||0)) s.daily.longestDaily = s.daily.streak;
    changed = true;
  }
 
  // Weekly streak
  if(isAllDone(currentUser,'weekly') && s.weekly.lastKey !== wk) {
    s.weekly.streak = (s.weekly.streak||0) + 1;
    s.weekly.lastKey = wk;
    if(s.weekly.streak > (s.weekly.longestWeekly||0)) s.weekly.longestWeekly = s.weekly.streak;
    changed = true;
  }
 
  // Monthly streak
  if(isAllDone(currentUser,'monthly') && s.monthly.lastKey !== mk) {
    s.monthly.streak = (s.monthly.streak||0) + 1;
    s.monthly.lastKey = mk;
    if(s.monthly.streak > (s.monthly.longestMonthly||0)) s.monthly.longestMonthly = s.monthly.streak;
    changed = true;
  }
 
  // Points: daily=1, weekly=5, monthly=20
  const m = streaks.macauly||{daily:{streak:0},weekly:{streak:0},monthly:{streak:0}};
  const b = streaks.brad||{daily:{streak:0},weekly:{streak:0},monthly:{streak:0}};
  streaks.macauly = streaks.macauly || m;
  streaks.brad = streaks.brad || b;
  streaks.macauly.totalPoints = ((streaks.macauly.daily||{}).streak||0)*1 + ((streaks.macauly.weekly||{}).streak||0)*5 + ((streaks.macauly.monthly||{}).streak||0)*20;
  streaks.brad.totalPoints    = ((streaks.brad.daily||{}).streak||0)*1    + ((streaks.brad.weekly||{}).streak||0)*5    + ((streaks.brad.monthly||{}).streak||0)*20;
 
  if(changed) await fbSet('app/streaks', streaks);
}

      </div>
    </div>`;
  };

  document.getElementById('view-streaks').innerHTML = `

      ${row(second.u, second.d, second.i, second.n, false)}
    </div>
    <div style="background:var(--white);border:1px solid var(--beige-mid);padding:16px 18px;margin-bottom:16px;">
      <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-light);margin-bottom:10px;">How Points Work</div>
      <div style="font-size:13px;color:var(--text-mid);line-height:1.8;">
        🔥 Complete all daily tasks = <strong>+1 point</strong> per day streak<br>
        📅 Complete all weekly tasks = <strong>+5 points</strong> per week streak<br>
        🏅 Complete all monthly tasks = <strong>+20 points</strong> per month streak<br>
        <span style="font-size:11px;color:var(--text-light);margin-top:4px;display:block;">Streaks reset if you miss a period. Points update as you tick tasks off.</span>
      </div>
    </div>`;
}
 
// ─── TASKS ───────────────────────────────────────────────────────────────────
const isTaskDone = (u,f,i) => taskState[u]?.[f]?.[keys()[f]]?.[i]===true;
const getStats = (u,f) => { const t=TASKS[u][f]; return {done:t.filter((_,i)=>isTaskDone(u,f,i)).length,total:t.length}; };
 
async function toggleTask(u,f,i) {
  if(u!==currentUser) return;
  const k=keys()[f];
  if(!taskState[u]) taskState[u]={};
  if(!taskState[u][f]) taskState[u][f]={};
  if(!taskState[u][f][k]) taskState[u][f][k]={};
  taskState[u][f][k][i] = !taskState[u][f][k][i];

  const startOffset=(firstDay===0)?6:firstDay-1;

  const dayNames=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  for(let i=startOffset-1;i>=0;i--){html+=`<div class="cal-day other-month"><div class="cal-day-num">${prevDays-i}</div></div>`;}
 
  for(let d=1;d<=daysInMonth;d++){

// ─── PAY LOG ─────────────────────────────────────────────────────────────────
function getPayWeekKey(offset){
  const d=new Date();d.setDate(d.getDate()+offset*7);
  const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);
  return new Date(d.setDate(diff)).toISOString().split('T')[0];
}
function getPayWeekLabel(offset){
  const wk=getPayWeekKey(offset);
  const mon=new Date(wk+'T12:00:00'),fri=new Date(mon);fri.setDate(fri.getDate()+4);
  const fmt=d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  return offset===0?`This Week (${fmt(mon)} – ${fmt(fri)})`:`${fmt(mon)} – ${fmt(fri)}`;
}
 
function getColourPayDays(colourId) {
  // Check loaded colourLabels first, then defaults
  const c = colourLabels.find(c=>c.id===colourId);
  if(c && c.payDays !== undefined) return c.payDays;
  const d = DEFAULT_COLOURS.find(c=>c.id===colourId);
  return d ? (d.payDays||0) : 0;
}
 
function getCalDaysForWeek(personName, weekStartKey){
  const mon=new Date(weekStartKey+'T12:00:00');
  let count=0;
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(d.getDate()+i);
    const dk=d.toISOString().split('T')[0];
    const entries=calEntries[dk]||[];
    entries.forEach(e=>{
      if(e.person===personName) {
        const pd = getColourPayDays(e.colourId||0);
        count += pd;
      }
    });
  }
  return count;
}
 
function calcEntryAmount(e) {
  let base = 0;
  const days = parseFloat(e.days);
  const rate = parseFloat(e.rate);
  const price = parseFloat(e.priceTotal);
  if(e.basis==='day-rate' && !isNaN(days) && !isNaN(rate)) base = days * rate;
  else if(e.basis==='price-work' && !isNaN(price)) base = price;
  const ot = (parseFloat(e.otHours)||0) * (parseFloat(e.otRate)||0);
  return base + ot;
}
 
let _payFocusId = null;
let _payFocusVal = null;
 
function renderPayLog(){
  // Save focused input before re-render
  if(document.activeElement && document.activeElement.dataset && document.activeElement.dataset.fieldkey) {
    _payFocusId = document.activeElement.dataset.fieldkey;
    _payFocusVal = document.activeElement.value;
  }
  const wk=getPayWeekKey(payLogWeekOffset);
  const entries=payLog[wk]?JSON.parse(JSON.stringify(payLog[wk])):[];
  const existingIds=entries.map(e=>e.personId);
  teamMembers.forEach(m=>{
    if(!existingIds.includes(m.id)){
      const calDays=getCalDaysForWeek(m.name, wk);
      entries.push({personId:m.id,name:m.name,role:m.role,days:calDays>0?calDays:'',rate:'',basis:'day-rate',priceTotal:'',otHours:'',otRate:'',note:'',amount:0});
    }
  });
 
  // Auto-fill days from calendar for any entry where days is still blank
  entries.forEach(e => {
    if(!e.days || e.days === '') {
      const calDays = getCalDaysForWeek(e.name, wk);
      if(calDays > 0) e.days = calDays;
    }
    // Recalculate amount with current values
    if(!e.basis) e.basis = 'day-rate';
    e.amount = calcEntryAmount(e);
  });
 
  const total=entries.reduce((sum,e)=>sum+(parseFloat(e.amount)||0),0);
  const pastWeeks=Object.keys(payLog).sort().reverse().filter(k=>k!==wk);
 
  let html=`<div class="view-header"><div class="view-title">Pay Log</div><div class="view-subtitle">Weekly pay — days auto-filled from calendar where possible</div></div>
  <div class="paylog-week-selector"><button class="cal-nav-btn" onclick="changePayWeek(-1)">‹</button><div class="paylog-week-label">${getPayWeekLabel(payLogWeekOffset)}</div><button class="cal-nav-btn" onclick="changePayWeek(1)">›</button></div>`;
 
  entries.forEach((e) => {
    const calDays = getCalDaysForWeek(e.name, wk);
    const amt = calcEntryAmount(e);
    const otAmt = (parseFloat(e.otHours)||0) * (parseFloat(e.otRate)||0);
    const pid = e.personId;
 
    html += `<div data-person-id="${pid}" style="background:var(--white);border:1px solid var(--beige-mid);margin-bottom:14px;border-left:4px solid var(--gold);">
      <div style="background:var(--black);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;">
        <div><span style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--beige);">${e.name}</span>
        <span style="font-size:11px;color:var(--text-light);margin-left:8px;">${e.role||''}</span></div>
        <span class="pay-card-total" style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gold);">£${amt.toFixed(2)}</span>
      </div>
      <div style="padding:14px;">
        <div style="display:flex;gap:8px;margin-bottom:12px;">
          <button onclick="setPayBasis('${wk}','${pid}','day-rate')" style="flex:1;padding:8px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;${e.basis==='day-rate'?'background:var(--black);color:var(--gold);':'background:var(--beige-light);color:var(--text-mid);'}">Day Rate</button>
          <button onclick="setPayBasis('${wk}','${pid}','price-work')" style="flex:1;padding:8px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;${e.basis==='price-work'?'background:var(--black);color:var(--gold);':'background:var(--beige-light);color:var(--text-mid);'}">Price Work</button>
        </div>
        ${e.basis==='day-rate'?`
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
          <div><label style="display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-light);margin-bottom:4px;">Days Worked</label>
            <input class="paylog-input" type="number" min="0" step="0.5" value="${e.days}" placeholder="${calDays>0?calDays+' in cal':'0'}" data-fieldkey="${pid}-days" oninput="updatePayField('${wk}','${pid}','days',this.value)"/>
            ${calDays>0?`<div class="cal-days-info">📅 ${calDays} days in calendar</div>`:''}
          </div>
          <div><label style="display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-light);margin-bottom:4px;">Day Rate £</label>
            <input class="paylog-input" type="number" min="0" step="1" value="${e.rate}" placeholder="e.g. 180" data-fieldkey="${pid}-rate" oninput="updatePayField('${wk}','${pid}','rate',this.value)"/>
          </div>
        </div>`:
        `<div style="margin-bottom:10px;"><label style="display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-light);margin-bottom:4px;">Price Work Total £</label>
          <input class="paylog-input" type="number" min="0" step="1" value="${e.priceTotal||''}" placeholder="e.g. 1200" data-fieldkey="${pid}-priceTotal" oninput="updatePayField('${wk}','${pid}','priceTotal',this.value)"/>
        </div>`}
        <div style="border-top:1px solid var(--beige-mid);padding-top:12px;margin-bottom:10px;">
          <div class="ot-label">⏱ Overtime / Evenings</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div><label style="display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-light);margin-bottom:4px;">OT Hours</label>
              <input class="paylog-input" type="number" min="0" step="0.5" value="${e.otHours||''}" placeholder="e.g. 3" data-fieldkey="${pid}-otHours" oninput="updatePayField('${wk}','${pid}','otHours',this.value)"/>
            </div>
            <div><label style="display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-light);margin-bottom:4px;">OT Rate £/hr</label>
              <input class="paylog-input" type="number" min="0" step="1" value="${e.otRate||''}" placeholder="e.g. 25" data-fieldkey="${pid}-otRate" oninput="updatePayField('${wk}','${pid}','otRate',this.value)"/>
            </div>
          </div>
          <div class="pay-ot-total" style="font-size:12px;color:var(--gold);margin-top:4px;">${otAmt>0?`OT total: £${otAmt.toFixed(2)}`:''}</div>
        </div>
        <div><label style="display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-light);margin-bottom:4px;">Note</label>
          <input class="paylog-input" type="text" value="${e.note||''}" placeholder="Optional note" data-fieldkey="${pid}-note" oninput="updatePayField('${wk}','${pid}','note',this.value)"/>
        </div>
      </div>
    </div>`;
  });
 
  // Breakdown + total
  const breakdownRows = entries.map(e => {
    const amt = calcEntryAmount(e);
    const otAmt = (parseFloat(e.otHours)||0)*(parseFloat(e.otRate)||0);
    const baseAmt = amt - otAmt;
    if(amt === 0) return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--beige-mid);"><span style="font-weight:600;font-size:13px;color:var(--text);">'+e.name+'</span><span style="font-size:12px;color:var(--text-light);font-style:italic;">Not entered</span></div>';
    let detail = '';
    if(e.basis==='day-rate' && e.days) detail += e.days+' days x £'+e.rate+' = £'+baseAmt.toFixed(2);
    if(e.basis==='price-work' && e.priceTotal) detail += 'Price work: £'+parseFloat(e.priceTotal).toFixed(2);
    if(otAmt>0) detail += ' + '+e.otHours+'hr OT x £'+e.otRate+' = £'+otAmt.toFixed(2);
    return '<div style="padding:10px 16px;border-bottom:1px solid var(--beige-mid);"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;"><span style="font-weight:600;font-size:14px;color:var(--text);">'+e.name+'</span><span style="font-family:Playfair Display,serif;font-size:16px;font-weight:700;color:var(--gold);">£'+amt.toFixed(2)+'</span></div><div style="font-size:12px;color:var(--text-mid);">'+detail+'</div></div>';
  }).join('');
 
  html += '<div style="background:var(--white);border:1px solid var(--beige-mid);margin-bottom:14px;">'
        + '<div style="background:var(--black2);padding:10px 16px;"><div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--beige);">This Week — Breakdown</div></div>'
        + breakdownRows
        + '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--beige);"><span style="font-family:Playfair Display,serif;font-size:15px;font-weight:700;color:var(--black);">Total Wages This Week</span><span style="font-family:Playfair Display,serif;font-size:20px;font-weight:900;color:var(--black);">£'+total.toFixed(2)+'</span></div>'
        + '</div>';
 
  html += '<div class="paylog-save-row"><button class="notes-save-btn" onclick="savePayLog(\'' + wk + '\')">Save Pay Log</button><span class="saved-msg" id="pay-saved-msg">Saved ✓</span></div>';
 
  if(pastWeeks.length>0){
    html+=`<div class="paylog-history"><div class="paylog-history-header"><div class="paylog-history-title">Previous Weeks</div></div>`;
    pastWeeks.forEach(wkKey=>{
      const wkEntries=payLog[wkKey]||[],wkTotal=wkEntries.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
      const mon=new Date(wkKey+'T12:00:00'),fri=new Date(mon);fri.setDate(fri.getDate()+4);
      const fmt=d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
      html+=`<div class="paylog-hist-week"><div class="paylog-hist-week-label">w/c ${fmt(mon)} — Total: £${wkTotal.toFixed(2)}</div>
        ${wkEntries.filter(e=>calcEntryAmount(e)>0).map(e=>`
          <div class="paylog-hist-row">
            <div class="paylog-hist-name">${e.name}</div>
            <div class="paylog-hist-detail">
              ${e.basis==='day-rate'&&e.days?`${e.days} days @ £${e.rate}/day`:''}
              ${e.basis==='price-work'&&e.priceTotal?`Price work £${e.priceTotal}`:''}
              <span class="basis-badge ${e.basis}" style="margin-left:6px;">${e.basis==='day-rate'?'Day Rate':'Price Work'}</span>
              ${(parseFloat(e.otHours)||0)>0?`<span style="color:var(--gold);margin-left:8px;">+${e.otHours}hr OT</span>`:''}
              ${e.note?`<span style="color:var(--text-light);margin-left:8px;">${e.note}</span>`:''}
            </div>
            <div class="paylog-hist-amount">£${calcEntryAmount(e).toFixed(2)}</div>
          </div>`).join('')}
      </div>`;
    });
    html+=`</div>`;
  }
 
  document.getElementById('view-paylog').innerHTML=html;
  // Restore focus after re-render
  if(_payFocusId) {
    const el = document.querySelector('[data-fieldkey="'+_payFocusId+'"]');
    if(el) { el.focus(); el.value = _payFocusVal||el.value; _payFocusId=null; }
  }
}
 
function changePayWeek(dir){payLogWeekOffset+=dir;renderPayLog();}
 
function ensurePayEntry(wk, personId) {
  if(!payLog[wk]) payLog[wk]=[];
  let entry = payLog[wk].find(e=>e.personId===personId);
  if(!entry) {
    const m = teamMembers.find(m=>m.id===personId) || {};
    entry = {personId,name:m.name||'',role:m.role||'',days:'',rate:'',basis:'day-rate',priceTotal:'',otHours:'',otRate:'',note:'',amount:0};
    payLog[wk].push(entry);
  }
  // Always ensure basis is set — older saved entries may be missing it
  if(!entry.basis) entry.basis = 'day-rate';
  return entry;
}
 
function setPayBasis(wk, personId, basis) {
  const entry = ensurePayEntry(wk, personId);
  entry.basis = basis;
  entry.amount = calcEntryAmount(entry);
  renderPayLog();
}
 
function updatePayField(wk, personId, field, val) {
  const entry = ensurePayEntry(wk, personId);
  entry[field] = val;
  entry.amount = calcEntryAmount(entry);
  renderPayLog();
}
 
async function savePayLog(wk){
  await fbSet('app/paylog', payLog);
  const msg=document.getElementById('pay-saved-msg');
  if(msg){msg.style.opacity='1';setTimeout(()=>msg.style.opacity='0',2000);}
}
 
// ─── SETTINGS ────────────────────────────────────────────────────────────────
function renderSettings() {
  // Merge defaults with loaded labels so payDays is always present
  const merged = DEFAULT_COLOURS.map(dc => {
    const loaded = colourLabels.find(c=>c.id===dc.id);
    return loaded ? {...dc, ...loaded} : dc;
  });
  let html = '<div class="view-header"><div class="view-title">Settings</div><div class="view-subtitle">Name each colour and set whether it counts as a paid day on the pay log</div></div>'
  + '<div class="settings-section"><div class="settings-header"><div class="settings-header-title">Calendar Colour Labels</div></div><div class="settings-body">';
  merged.forEach(c => {
    const pd = c.payDays!==undefined ? c.payDays : 0;
    html += '<div class="colour-row">'
      + '<div class="colour-swatch" style="background:'+c.hex+'"></div>'
      + '<input class="colour-input" type="text" value="'+c.label+'" placeholder="Name this colour..." oninput="updateColourLabel('+c.id+',this.value)"/>'
      + '<div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:'+(pd>0?'var(--green)':'var(--text-light)')+';min-width:60px;text-align:right;">'+(pd===1?'Full day':pd===0.5?'Half day':'No pay')+'</div>'
      + '</div>';
  });
  html += '<div style="font-size:12px;color:var(--text-mid);margin-top:12px;padding:10px;background:var(--beige-light);border:1px solid var(--beige-mid);">🟢 <strong>On Site</strong> = full day pay &nbsp;|&nbsp; 🟣 <strong>Half Day</strong> = 0.5 days pay &nbsp;|&nbsp; All other colours = no pay counted</div>';
  html += '<button class="notes-save-btn" style="margin-top:14px;" onclick="saveColourLabels()">Save Labels</button><span class="saved-msg" id="colours-saved-msg" style="margin-left:10px;">Saved ✓</span></div></div>';
  document.getElementById('view-settings').innerHTML=html;
}
 
function updateColourLabel(id, val) {
  colourLabels = colourLabels.map(c => c.id===id ? {...c, label:val} : c);
}
 
async function saveColourLabels() {
  // Preserve payDays from defaults when saving
  const toSave = colourLabels.map(c => {
    const def = DEFAULT_COLOURS.find(d=>d.id===c.id);
    return {...c, payDays: def ? def.payDays : (c.payDays||0)};
  });
  colourLabels = toSave;
  await fbSet('app/colours', {list:toSave});
  const msg=document.getElementById('colours-saved-msg');
  if(msg){msg.style.opacity='1';setTimeout(()=>msg.style.opacity='0',2000);}
}
 
// ─── NOTIFICATION ────────────────────────────────────────────────────────────
function showNotif(from,msg){
  document.getElementById('notif-from').textContent=from;
  document.getElementById('notif-msg').textContent=msg;
  const el=document.getElementById('notification');
  el.style.display='block';
  setTimeout(()=>el.style.display='none',5000);
}
 
// ─── NAVIGATION ──────────────────────────────────────────────────────────────
const views=['tasks','notes','calendar','team','streaks','nudge','manage','paylog','settings'];
function showView(view,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(tab)tab.classList.add('active');
  views.forEach(v=>document.getElementById('view-'+v).style.display=v===view?'block':'none');
  if(view==='tasks')renderTasks();
  if(view==='notes')renderNotes();
  if(view==='calendar')renderCalendar();
  if(view==='team')renderTeam();
  if(view==='streaks')renderStreaks();
  if(view==='nudge')renderNudge();
  if(view==='manage')renderManage();
  if(view==='paylog')renderPayLog();
  if(view==='settings')renderSettings();
}
 
// ─── AUTH ────────────────────────────────────────────────────────────────────
async function login(user){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  currentUser=user;
  notesViewDate=new Date();
  document.getElementById('header-avatar').textContent=user==='macauly'?'MP':'BP';
  document.getElementById('header-name').textContent=user==='macauly'?'Macauly':'Brad';
  await loadAll();
  lastNudgeCount=nudges.filter(n=>n.to===currentUser&&n.date===todayKey()).length;
  await checkAndUpdateStreaks();
  showView('tasks',null);
  document.querySelectorAll('.tab')[0].classList.add('active');
}
 
function logout(){
  unsubscribers.forEach(u=>u());
  unsubscribers=[];
  currentUser=null;
  calYear=undefined;calMonth=undefined;selectedCalDate=null;
  notesViewDate=new Date();
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}
 
// Expose functions globally
window.login=login; window.logout=logout; window.showView=showView;
window.toggleTask=toggleTask; window.saveNote=saveNote;
window.changeNotesDate=changeNotesDate; window.goNotesToday=goNotesToday;
window.changeMonth=changeMonth; window.selectCalDay=selectCalDay;
window.addCalEntry=addCalEntry; window.removeCalEntry=removeCalEntry;
window.sendNudge=sendNudge;
window.addMember=addMember; window.removeMember=removeMember;
window.startMemberEdit=startMemberEdit; window.cancelMemberEdit=cancelMemberEdit; window.saveMemberEdit=saveMemberEdit;
window.changePayWeek=changePayWeek; window.updatePayField=updatePayField; window.savePayLog=savePayLog; window.setPayBasis=setPayBasis; window.ensurePayEntry=ensurePayEntry;
window.updateColourLabel=updateColourLabel; window.saveColourLabels=saveColourLabels; window.copyPrevDay=copyPrevDay;
</script>
